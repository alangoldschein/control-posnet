// ── Storage ──────────────────────────────────────────────
function sGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}}
function sSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

// ── Utils ────────────────────────────────────────────────
function addDays(s,d){
  if(!s)return"";
  const[dd,mm,yy]=s.split("/");
  if(!dd||!mm||!yy)return"";
  const dt=new Date(`${yy}-${mm}-${dd}`);
  if(isNaN(dt))return"";
  dt.setDate(dt.getDate()+d);
  return dt.toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"});
}
function toMs(s){if(!s)return 0;const[d,m,y]=s.split("/");return new Date(`${y}-${m}-${d}`).getTime()}
function hoy(){return new Date().toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"})}
const fmt=n=>new Intl.NumberFormat("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0}).format(n||0);

function sortCierres(arr){
  return[...arr].sort((a,b)=>{
    const dd=toMs(b.fecha)-toMs(a.fecha);
    if(dd!==0)return dd;
    const ts=h=>{if(!h)return 0;const[hh,mm,ss]=h.split(":");return+hh*3600+ +mm*60+ +(ss||0)};
    return ts(b.hora)-ts(a.hora);
  });
}

function calcCierre(raw){
  const qr=parseFloat(raw.qrDebito)||0;
  const cred=parseFloat(raw.credito)||0;
  const total=parseFloat(raw.totalPesos)||(qr+cred);
  const pct=parseFloat(raw.comisionPct)||0.095;
  const com=Math.round(total*pct);
  return{...raw,qrDebito:qr,credito:cred,totalPesos:total,comisionPct:pct,comisionMonto:com,saldoNeto:total-com,
    fechaAcredQR:qr>0?addDays(raw.fecha,3):"",
    fechaAcredCredito:cred>0?addDays(raw.fecha,18):""};
}

// ── AI ───────────────────────────────────────────────────
async function extractFromImage(base64,mediaType,apiKey){
  const resp=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({
      model:"claude-opus-4-5",max_tokens:600,
      messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:mediaType,data:base64}},
        {type:"text",text:`Leé este ticket de cierre de lote de posnet argentino. Respondé SOLO con JSON válido sin texto extra ni markdown:
{"terminal":"número de terminal","fecha":"DD/MM/YYYY","hora":"HH:MM:SS","nroLote":"número de lote","nroComercio":"número si aparece","qrDebito":número,"credito":número,"totalPesos":número}
- hora: del encabezado del ticket
- qrDebito: suma VISA DEBITO + MASTERCARD PREPAGO + QR + todo con DEBITO o PREPAGO
- credito: MASTERCARD + VISA crédito + AMEX (sin la palabra débito)
- totalPesos: TOTALES EN PESOS del ticket
- Números sin $ ni puntos de miles. Campos ausentes = 0 o "".`}
      ]}]
    })
  });
  const data=await resp.json();
  const text=data.content?.find(b=>b.type==="text")?.text||"{}";
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(",")[1]);
    r.onerror=()=>rej(new Error("Error"));
    r.readAsDataURL(file);
  });
}

// ── Excel ────────────────────────────────────────────────
function exportExcel(clientName,cierres,retiros,comisionPct){
  const wb=XLSX.utils.book_new();
  const h1=["Terminal","Fecha","Hora","N° Lote","N° Comercio","QR/Débito ($)","Crédito ($)","Total Pesos","Comisión %","Comisión ($)","Saldo Neto","Fecha Acred. QR","Fecha Acred. Cred"];
  const d1=sortCierres(cierres).map(r=>[r.terminal,r.fecha,r.hora||"",r.nroLote,r.nroComercio||"",r.qrDebito,r.credito,r.totalPesos,r.comisionPct,r.comisionMonto,r.saldoNeto,r.fechaAcredQR,r.fechaAcredCredito]);
  const tot=["TOTALES","","","","",cierres.reduce((a,r)=>a+(r.qrDebito||0),0),cierres.reduce((a,r)=>a+(r.credito||0),0),cierres.reduce((a,r)=>a+(r.totalPesos||0),0),comisionPct,cierres.reduce((a,r)=>a+(r.comisionMonto||0),0),cierres.reduce((a,r)=>a+(r.saldoNeto||0),0),"",""];
  const ws1=XLSX.utils.aoa_to_sheet([h1,...d1,tot]);
  ws1["!cols"]=h1.map((_,i)=>({wch:i<5?13:18}));
  XLSX.utils.book_append_sheet(wb,ws1,"Cierres");

  const acredMap={};
  cierres.forEach(c=>{
    const add=(fecha,monto,tipo)=>{
      if(!fecha||!monto)return;
      if(!acredMap[fecha])acredMap[fecha]={qr:0,cred:0};
      acredMap[fecha][tipo]+=Math.round(monto-monto*c.comisionPct);
    };
    if(c.qrDebito>0)add(c.fechaAcredQR,c.qrDebito,"qr");
    if(c.credito>0)add(c.fechaAcredCredito,c.credito,"cred");
  });
  const hoyMs=toMs(hoy());
  const h2=["Fecha Acreditación","QR/Débito ($)","Crédito ($)","Total del día ($)","Estado"];
  const d2=Object.entries(acredMap).sort(([a],[b])=>toMs(a)-toMs(b)).map(([f,{qr,cred}])=>[f,qr,cred,qr+cred,toMs(f)<=hoyMs?"Acreditado":"Pendiente"]);
  const ws2=XLSX.utils.aoa_to_sheet([h2,...d2]);
  ws2["!cols"]=[{wch:18},{wch:16},{wch:16},{wch:16},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws2,"Calendario de cobros");

  const h3=["Tipo","Fecha","Descripción","Monto ($)","Saldo acumulado ($)"];
  const movs=[];let saldo=0;
  Object.entries(acredMap).sort(([a],[b])=>toMs(a)-toMs(b)).forEach(([f,{qr,cred}])=>{
    if(toMs(f)>hoyMs)return;
    saldo+=qr+cred;
    movs.push(["Acreditación",f,qr>0&&cred>0?"QR+Crédito":qr>0?"QR/Débito":"Crédito",qr+cred,saldo]);
  });
  [...retiros].sort((a,b)=>toMs(a.fecha)-toMs(b.fecha)).forEach(r=>{saldo-=r.monto;movs.push(["Retiro",r.fecha,r.descripcion||"",-r.monto,saldo])});
  const ws3=XLSX.utils.aoa_to_sheet([h3,...movs]);
  ws3["!cols"]=[{wch:14},{wch:14},{wch:28},{wch:16},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws3,"Cuenta corriente");
  XLSX.writeFile(wb,`Cierres_${clientName.replace(/\s+/g,"_")}_${new Date().toLocaleDateString("es-AR").replace(/\//g,"-")}.xlsx`);
}

function exportConsolidado(clients,allData){
  const wb=XLSX.utils.book_new();
  const hdrs=["Cliente","Terminal","Fecha","Hora","N° Lote","QR/Déb ($)","Crédito ($)","Total ($)","Com %","Com ($)","Saldo ($)","Acred. QR","Acred. Cred"];
  const rows=[];
  clients.forEach(([,u])=>{
    sortCierres(allData[u.clientId]?.cierres||[]).forEach(r=>{
      rows.push([u.nombre,r.terminal,r.fecha,r.hora||"",r.nroLote,r.qrDebito,r.credito,r.totalPesos,r.comisionPct,r.comisionMonto,r.saldoNeto,r.fechaAcredQR,r.fechaAcredCredito]);
    });
  });
  const ws=XLSX.utils.aoa_to_sheet([hdrs,...rows]);
  ws["!cols"]=hdrs.map(()=>({wch:14}));
  XLSX.utils.book_append_sheet(wb,ws,"Consolidado");
  XLSX.writeFile(wb,`Consolidado_${new Date().toLocaleDateString("es-AR").replace(/\//g,"-")}.xlsx`);
}

function Badge({type,children}){
  const map={
    green:{bg:G.greenBg,color:G.greenText,border:G.greenBorder},
    amber:{bg:G.amberBg,color:G.amberText,border:G.amberBorder},
    red:{bg:G.redBg,color:G.redText,border:G.redBorder},
    blue:{bg:G.blueBg,color:G.blueText,border:G.blueBorder},
    purple:{bg:G.purpleBg,color:G.purple,border:G.purpleBorder},
  };

  return <span style={{background:s.bg,color:s.color,border:`1px solid ${s.border}`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{children}</span>;

// ── API Key Screen ────────────────────────────────────────
function ApiKeyScreen({onSave}){
  const[key,setKey]=useState("");const[err,setErr]=useState("");
  const save=()=>{
    if(!key.startsWith("sk-ant-")){setErr("La key debe empezar con sk-ant-");return;}
    onSave(key);
  };
  return(
    <div style={{minHeight:"100vh",background:G.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:440}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{width:52,height:52,background:G.blue,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",fontSize:24}}>🔑</div>
          <h1 style={{fontSize:20,fontWeight:800,color:G.text,margin:"0 0 6px"}}>Configuración inicial</h1>
          <p style={{color:G.muted,fontSize:14,margin:0}}>Necesitás una API key de Anthropic para leer las fotos</p>
        </div>
        <div style={{...card,marginBottom:14}}>
          <div style={{marginBottom:14}}>
            <label style={{display:"block",fontSize:13,fontWeight:600,color:G.muted,marginBottom:6}}>API Key de Anthropic</label>

// ── Login ─────────────────────────────────────────────────
function Login({onLogin,users}){
  const[u,setU]=useState("");const[p,setP]=useState("");const[err,setErr]=useState("");
  const go=()=>{
    const usr=users[u.toLowerCase()];
    if(!usr||usr.password!==p){setErr("Usuario o contraseña incorrectos");return;}
    onLogin(u.toLowerCase(),usr.role,usr.clientId);
  };
  return(
    <div style={{minHeight:"100vh",background:G.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{width:52,height:52,background:G.blue,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",fontSize:24}}>💳</div>
          <h1 style={{fontSize:22,fontWeight:800,color:G.text,letterSpacing:"-0.03em",margin:"0 0 5px"}}>Control de Cierres</h1>
          <p style={{color:G.muted,fontSize:14,margin:0}}>Sistema de gestión de posnet</p>
        </div>
        <div style={{...card}}>
          {[["Usuario",u,setU,"text","tu_usuario"],["Contraseña",p,setP,"password","••••••••"]].map(([lbl,val,set,type,ph])=>(
            <div key={lbl} style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:13,fontWeight:600,color:G.muted,marginBottom:6}}>{lbl}</label>
              <input type={type} value={val} placeholder={ph} onChange={e=>set(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} style={inputSt}/>
            </div>
          ))}
          {err&&<div style={{background:G.redBg,border:`1px solid ${G.redBorder}`,borderRadius:8,padding:"9px 12px",color:G.redText,fontSize:13,marginBottom:14}}>{err}</div>}
          <button onClick={go} style={{...btnPrimary,width:"100%",padding:"13px",fontSize:15}}>Ingresar</button>
        </div>
      </div>
    </div>
  );
}

// ── Upload Zone ───────────────────────────────────────────
function UploadZone({onFiles,loading}){
  const ref=useRef();const[drag,setDrag]=useState(false);
  return(
    <div onClick={()=>!loading&&ref.current?.click()}
      onDrop={e=>{e.preventDefault();setDrag(false);if(!loading)onFiles(Array.from(e.dataTransfer.files));}}
      onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
      style={{border:`2px dashed ${drag?G.blue:G.border}`,borderRadius:14,padding:"28px 20px",textAlign:"center",cursor:loading?"default":"pointer",background:drag?G.blueBg:G.white,transition:"all .2s",marginBottom:18}}>
      <input ref={ref} type="file" accept="image/*" multiple onChange={e=>onFiles(Array.from(e.target.files))} style={{display:"none"}}/>
      {loading?(
        <>
          <div style={{width:32,height:32,border:`3px solid ${G.blue}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin .8s linear infinite",margin:"0 auto 10px"}}/>
          <div style={{fontWeight:600,fontSize:15,color:G.blue,marginBottom:3}}>Procesando con IA...</div>
          <div style={{fontSize:13,color:G.muted}}>Leyendo el ticket...</div>
        </>
      ):(
        <>
          <div style={{fontSize:28,marginBottom:8}}>📷</div>
          <div style={{fontWeight:600,fontSize:15,color:G.text,marginBottom:3}}>Subir fotos de cierres</div>
          <div style={{fontSize:13,color:G.muted}}>Tocá para seleccionar · Podés subir varios a la vez</div>
        </>
      )}
    </div>
  );
}

// ── Tab Cierres ───────────────────────────────────────────
function TabCierres({cierres,onDelete}){
  const[expanded,setExpanded]=useState(null);
  const totTotal=cierres.reduce((a,r)=>a+r.totalPesos,0);
  const totQR=cierres.reduce((a,r)=>a+r.qrDebito,0);
  const totCred=cierres.reduce((a,r)=>a+r.credito,0);
  const totCom=cierres.reduce((a,r)=>a+r.comisionMonto,0);
  const totSaldo=cierres.reduce((a,r)=>a+r.saldoNeto,0);
  const hoyMs=toMs(hoy());

    <div>
      <div style={{...card,marginBottom:14}}>

          <span style={{fontSize:20,fontWeight:800,color:G.greenText,letterSpacing:"-0.02em"}}>{fmt(totSaldo)}</span>
        </div>
      </div>

        const isOpen=expanded===idx;
        const yaQR=r.fechaAcredQR&&toMs(r.fechaAcredQR)<=hoyMs;
        const yaCred=r.fechaAcredCredito&&toMs(r.fechaAcredCredito)<=hoyMs;

          <div key={idx} className="anim" style={{...card,marginBottom:10,padding:0,overflow:"hidden"}}>
            <div onClick={()=>setExpanded(isOpen?null:idx)} style={{padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>

                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap"}}>
                  <span style={{fontWeight:700,fontSize:14}}>Terminal {r.terminal}</span>
                  <span style={{fontSize:12,color:G.muted,background:G.bg,borderRadius:6,padding:"2px 8px",fontFamily:"monospace"}}>Lote {r.nroLote}</span>
                </div>
                <div style={{fontSize:12,color:G.muted}}>{r.fecha}{r.hora?` · ${r.hora}`:""}{r.nroComercio?` · Com. ${r.nroComercio}`:""}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontWeight:800,fontSize:16,color:G.text,letterSpacing:"-0.02em"}}>{fmt(r.totalPesos)}</div>
                <div style={{fontSize:11,color:G.greenText,fontWeight:600}}>Saldo {fmt(r.saldoNeto)}</div>
              </div>
              <div style={{color:G.hint,fontSize:14,transition:"transform .2s",transform:isOpen?"rotate(180deg)":"none"}}>▾</div>
            </div>
            {isOpen&&(
              <div style={{borderTop:`1px solid ${G.borderLight}`,padding:"14px 16px"}}>
                <div style={{display:"grid",gridTemplateColumns:r.qrDebito>0&&r.credito>0?"1fr 1fr":"1fr",gap:8,marginBottom:12}}>
                  {r.qrDebito>0&&(
                    <div style={{background:G.blueBg,border:`1px solid ${G.blueBorder}`,borderRadius:10,padding:"10px 12px"}}>
                      <div style={{fontSize:9,color:G.blueText,textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:600,marginBottom:3}}>QR / Débito</div>
                      <div style={{fontWeight:700,fontSize:16,color:G.blueText,marginBottom:6}}>{fmt(r.qrDebito)}</div>
                      <Badge type={yaQR?"green":"amber"}>{yaQR?`✓ Acreditado ${r.fechaAcredQR}`:`Acredita ${r.fechaAcredQR}`}</Badge>
                    </div>
                  )}
                  {r.credito>0&&(
                    <div style={{background:G.purpleBg,border:`1px solid ${G.purpleBorder}`,borderRadius:10,padding:"10px 12px"}}>
                      <div style={{fontSize:9,color:G.purple,textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:600,marginBottom:3}}>Crédito</div>
                      <div style={{fontWeight:700,fontSize:16,color:G.purple,marginBottom:6}}>{fmt(r.credito)}</div>
                      <Badge type={yaCred?"green":"amber"}>{yaCred?`✓ Acreditado ${r.fechaAcredCredito}`:`Acredita ${r.fechaAcredCredito}`}</Badge>
                    </div>
                  )}
                </div>
                <div style={{background:G.amberBg,border:`1px solid ${G.amberBorder}`,borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <span style={{fontSize:13,color:G.amberText}}>Comisión {(r.comisionPct*100).toFixed(2)}%</span>
                  <span style={{fontWeight:700,color:G.amberText,fontSize:15}}>− {fmt(r.comisionMonto)}</span>
                </div>
                <div style={{background:G.greenBg,border:`1px solid ${G.greenBorder}`,borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <span style={{fontSize:13,color:G.greenText,fontWeight:600}}>Saldo neto</span>
                  <span style={{fontWeight:800,color:G.greenText,fontSize:16}}>{fmt(r.saldoNeto)}</span>
                </div>
                <button onClick={()=>{if(window.confirm("¿Eliminar este cierre?"))onDelete(idx);}} style={{...btnDanger,width:"100%"}}>Eliminar este cierre</button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── Tab Calendario ────────────────────────────────────────
function TabCalendario({cierres}){
  const map={};
  cierres.forEach(c=>{
    const add=(fecha,monto,tipo,terminal,lote)=>{
      if(!fecha||!monto)return;
      if(!map[fecha])map[fecha]={qr:0,cred:0,items:[]};
      const neto=Math.round(monto-monto*c.comisionPct);
      map[fecha][tipo]+=neto;
      map[fecha].items.push({terminal,lote,tipo,monto:neto});
    };
    if(c.qrDebito>0)add(c.fechaAcredQR,c.qrDebito,"qr",c.terminal,c.nroLote);
    if(c.credito>0)add(c.fechaAcredCredito,c.credito,"cred",c.terminal,c.nroLote);
  });
  const dias=Object.entries(map).sort(([a],[b])=>toMs(a)-toMs(b));
  const hoyMs=toMs(hoy());
  const totAcred=dias.filter(([f])=>toMs(f)<=hoyMs).reduce((a,[,v])=>a+v.qr+v.cred,0);
  const totPend=dias.filter(([f])=>toMs(f)>hoyMs).reduce((a,[,v])=>a+v.qr+v.cred,0);
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        <div style={{...card}}>
          <div style={{fontSize:10,color:G.hint,textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:600,marginBottom:4}}>Ya acreditado</div>
          <div style={{fontSize:20,fontWeight:800,color:G.green}}>{fmt(totAcred)}</div>
        </div>
        <div style={{...card}}>
          <div style={{fontSize:10,color:G.hint,textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:600,marginBottom:4}}>Por acreditar</div>
          <div style={{fontSize:20,fontWeight:800,color:G.amber}}>{fmt(totPend)}</div>
        </div>
      </div>
      {dias.map(([fecha,data])=>{
        const pasado=toMs(fecha)<=hoyMs;
        const total=data.qr+data.cred;
        return(
          <div key={fecha} style={{...card,marginBottom:10,borderLeft:`3px solid ${pasado?G.green:G.border}`,borderRadius:"0 14px 14px 0"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:data.items.length>1?10:0}}>
              <div>
                <div style={{fontWeight:700,fontSize:15,color:G.text,marginBottom:5}}>{fecha}</div>
                <Badge type={pasado?"green":"amber"}>{pasado?"✓ Acreditado":"Pendiente"}</Badge>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontWeight:800,fontSize:20,color:pasado?G.green:G.text,letterSpacing:"-0.03em"}}>{fmt(total)}</div>
                {data.qr>0&&data.cred>0&&<div style={{fontSize:11,color:G.muted}}>QR {fmt(data.qr)} · Cred {fmt(data.cred)}</div>}
              </div>
            </div>
            {data.items.length>1&&data.items.map((it,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",borderTop:`1px solid ${G.borderLight}`,paddingTop:7,marginTop:6}}>
                <span style={{fontSize:12,color:G.muted}}>Terminal {it.terminal} · Lote {it.lote} · {it.tipo==="qr"?"QR/Débito":"Crédito"}</span>
                <span style={{fontSize:12,fontWeight:600,color:G.text}}>{fmt(it.monto)}</span>
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

// ── Tab Cuenta ────────────────────────────────────────────
function TabCuenta({cierres,retiros,onRetirosChange}){
  const[newR,setNewR]=useState({fecha:hoy(),monto:"",descripcion:""});
  const[err,setErr]=useState("");
  const acredMap={};
  cierres.forEach(c=>{
    const add=(fecha,monto)=>{if(!fecha||!monto)return;acredMap[fecha]=(acredMap[fecha]||0)+Math.round(monto-monto*c.comisionPct);};
    if(c.qrDebito>0)add(c.fechaAcredQR,c.qrDebito);
    if(c.credito>0)add(c.fechaAcredCredito,c.credito);
  });
  const hoyMs=toMs(hoy());
  const acredHoy=Object.entries(acredMap).filter(([f])=>toMs(f)<=hoyMs).reduce((a,[,v])=>a+v,0);
  const porAcreditar=Object.entries(acredMap).filter(([f])=>toMs(f)>hoyMs).reduce((a,[,v])=>a+v,0);
  const totalRetiros=retiros.reduce((a,r)=>a+r.monto,0);
  const disponible=acredHoy-totalRetiros;
  const agregar=()=>{
    const monto=parseFloat(newR.monto);
    if(!monto||monto<=0){setErr("Ingresá un monto válido");return;}
    if(!newR.fecha){setErr("Ingresá una fecha");return;}
    if(monto>disponible){setErr(`Supera el saldo disponible (${fmt(disponible)})`);return;}
    onRetirosChange([...retiros,{...newR,monto,id:Date.now()}]);
    setNewR({fecha:hoy(),monto:"",descripcion:""});setErr("");
  };
  return(
    <div>
      <div style={{...card,marginBottom:14}}>
        <div style={{fontSize:11,color:G.hint,textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:600,marginBottom:4}}>Saldo disponible ahora</div>
        <div style={{fontSize:34,fontWeight:800,color:disponible>=0?G.green:G.red,letterSpacing:"-0.04em",marginBottom:16}}>{fmt(disponible)}</div>
        {[{label:"Acreditado hasta hoy",value:fmt(acredHoy),color:G.green},{label:"Total retirado",value:fmt(totalRetiros),color:G.red},{label:"Por acreditar",value:fmt(porAcreditar),color:G.amber}].map(({label,value,color},i,arr)=>(
          <div key={label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:i<arr.length-1?`1px solid ${G.borderLight}`:"none"}}>
            <span style={{fontSize:13,color:G.muted}}>{label}</span>
            <span style={{fontSize:15,fontWeight:700,color}}>{value}</span>
          </div>
        ))}
      </div>
      <div style={{fontWeight:700,fontSize:15,color:G.text,marginBottom:10}}>Registrar retiro</div>
      <div style={{...card,marginBottom:14}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          <div>
            <label style={{display:"block",fontSize:12,fontWeight:600,color:G.muted,marginBottom:5}}>Fecha</label>
            <input type="text" value={newR.fecha} placeholder="DD/MM/AAAA" onChange={e=>setNewR(p=>({...p,fecha:e.target.value}))} style={inputSt}/>
          </div>
          <div>
            <label style={{display:"block",fontSize:12,fontWeight:600,color:G.muted,marginBottom:5}}>Monto</label>
            <input type="number" value={newR.monto} placeholder="0" onChange={e=>setNewR(p=>({...p,monto:e.target.value}))} style={{...inputSt,textAlign:"right"}}/>
          </div>
        </div>
        <div style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:12,fontWeight:600,color:G.muted,marginBottom:5}}>Descripción (opcional)</label>
          <input type="text" value={newR.descripcion} placeholder="Ej: Retiro bancario..." onChange={e=>setNewR(p=>({...p,descripcion:e.target.value}))} style={inputSt}/>
        </div>
        {err&&<div style={{background:G.redBg,border:`1px solid ${G.redBorder}`,borderRadius:8,padding:"8px 12px",color:G.redText,fontSize:13,marginBottom:10}}>{err}</div>}
        <button onClick={agregar} style={{...btnPrimary,width:"100%"}}>+ Registrar retiro</button>
      </div>
      {retiros.length>0&&(
        <>
          <div style={{fontWeight:700,fontSize:15,color:G.text,marginBottom:10}}>Retiros registrados</div>
          {[...retiros].sort((a,b)=>toMs(b.fecha)-toMs(a.fecha)).map(r=>(
            <div key={r.id} style={{...card,marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontWeight:700,fontSize:15,color:G.red}}>{fmt(r.monto)}</div>
                <div style={{fontSize:12,color:G.muted,marginTop:2}}>{r.fecha}{r.descripcion?` · ${r.descripcion}`:""}</div>
              </div>
              <button onClick={()=>onRetirosChange(retiros.filter(x=>x.id!==r.id))} style={{...btnDanger,padding:"7px 12px"}}>Eliminar</button>
            </div>
          ))}
        </>
      )}
    </div>
  );
}

// ── Client View ───────────────────────────────────────────
function ClientView({clientName,comisionPct,cierres,retiros,onCierresChange,onRetirosChange,onBack,onLogout,apiKey}){
  const[tab,setTab]=useState("cierres");
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState(null);
  const processFiles=useCallback(async(files)=>{
    setLoading(true);setError(null);
    const newRows=[];
    for(const file of files){
      if(!file.type.startsWith("image/"))continue;
      try{
        const b64=await fileToBase64(file);
        const ex=await extractFromImage(b64,file.type,apiKey);
        newRows.push(calcCierre({...ex,comisionPct}));
      }catch(e){setError(`Error: ${e.message}`);}
    }
    onCierresChange([...cierres,...newRows]);
    setLoading(false);
  },[cierres,comisionPct,apiKey]);

  const TABS=[{id:"cierres",label:`Cierres (${cierres.length})`},{id:"calendario",label:"Calendario"},{id:"cuenta",label:"Cuenta corriente"}];
  return(
    <div style={{minHeight:"100vh",background:G.bg}}>
      <div style={topbar}>
        {onBack&&<button onClick={onBack} style={{background:"none",border:"none",fontSize:22,color:G.muted,padding:0}}>←</button>}
        <div style={{fontWeight:700,fontSize:15,flex:1,color:G.text}}>{clientName}</div>
        <button onClick={()=>exportExcel(clientName,cierres,retiros,comisionPct)} style={{...btnOutline,fontSize:12,padding:"8px 14px"}}>↓ Excel</button>
        <button onClick={onLogout} style={{...btnGhost,fontSize:12,padding:"8px 12px"}}>Salir</button>
      </div>
      <div style={{maxWidth:720,margin:"0 auto",padding:"20px 16px"}}>
        <UploadZone onFiles={processFiles} loading={loading}/>
        {error&&<div style={{background:G.redBg,border:`1px solid ${G.redBorder}`,borderRadius:10,padding:"10px 14px",color:G.redText,fontSize:13,marginBottom:14}}>{error}</div>}
        {cierres.length===0&&!loading?(
          <div style={{textAlign:"center",padding:"40px 0",color:G.hint}}>
            <div style={{fontSize:36,marginBottom:10}}>📋</div>
            <div style={{fontSize:15,fontWeight:600,marginBottom:4}}>Sin cierres cargados</div>
            <div style={{fontSize:13}}>Subí las fotos de los tickets para comenzar</div>
          </div>
        ):(
          <>
            <TabBar tabs={TABS} active={tab} onChange={setTab}/>
            {tab==="cierres"&&<TabCierres cierres={cierres} onDelete={i=>onCierresChange(sortCierres(cierres).filter((_,idx)=>idx!==i))}/>}
            {tab==="calendario"&&<TabCalendario cierres={cierres}/>}
            {tab==="cuenta"&&<TabCuenta cierres={cierres} retiros={retiros} onRetirosChange={onRetirosChange}/>}
          </>
        )}
      </div>
    </div>
  );
}

// ── Admin View ────────────────────────────────────────────
function AdminView({allData,users,setUsers,setAllData,onLogout,apiKey}){
  const[screen,setScreen]=useState("dash");
  const[selUsr,setSelUsr]=useState(null);
  const[nc,setNc]=useState({nombre:"",usuario:"",password:"",comision:"9.5"});
  const[ncErr,setNcErr]=useState("");
  const clients=Object.entries(users).filter(([,u])=>u.role==="client");

  const addClient=()=>{
    if(!nc.nombre||!nc.usuario||!nc.password){setNcErr("Completá todos los campos");return;}
    if(users[nc.usuario.toLowerCase()]){setNcErr("Ese usuario ya existe");return;}
    const clientId=`cl_${Date.now()}`;
    setUsers({...users,[nc.usuario.toLowerCase()]:{password:nc.password,role:"client",clientId,nombre:nc.nombre,comision:parseFloat(nc.comision)/100||0.095}});
    setAllData({...allData,[clientId]:{cierres:[],retiros:[]}});
    setNc({nombre:"",usuario:"",password:"",comision:"9.5"});setNcErr("");setScreen("dash");
  };

  if(screen==="detail"&&selUsr){
    const udata=users[selUsr];
    const cd=allData[udata.clientId]||{cierres:[],retiros:[]};
    return <ClientView clientName={udata.nombre} comisionPct={udata.comision} cierres={cd.cierres||[]} retiros={cd.retiros||[]}
      onCierresChange={c=>setAllData({...allData,[udata.clientId]:{...cd,cierres:c}})}
      onRetirosChange={r=>setAllData({...allData,[udata.clientId]:{...cd,retiros:r}})}
      onBack={()=>setScreen("dash")} onLogout={onLogout} apiKey={apiKey}/>;
  }

  if(screen==="newclient")return(
    <div style={{minHeight:"100vh",background:G.bg}}>
      <div style={topbar}>
        <button onClick={()=>setScreen("dash")} style={{background:"none",border:"none",fontSize:22,color:G.muted,padding:0}}>←</button>
        <div style={{fontWeight:700,fontSize:15,color:G.text}}>Nuevo cliente</div>
      </div>
      <div style={{maxWidth:460,margin:"28px auto",padding:"0 16px"}}>
        <div style={card}>
          {[{label:"Nombre del cliente",key:"nombre",type:"text",ph:"Ej: Restaurante El Sol"},{label:"Usuario (para el login)",key:"usuario",type:"text",ph:"Ej: elsol"},{label:"Contraseña",key:"password",type:"password",ph:""},{label:"Comisión (%)",key:"comision",type:"number",ph:"9.5"}].map(({label,key,type,ph})=>(
            <div key={key} style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:13,fontWeight:600,color:G.muted,marginBottom:6}}>{label}</label>
              <input type={type} value={nc[key]} placeholder={ph} onChange={e=>setNc(p=>({...p,[key]:e.target.value}))} style={inputSt}/>
            </div>
          ))}
          {ncErr&&<div style={{background:G.redBg,border:`1px solid ${G.redBorder}`,borderRadius:8,padding:"9px 12px",color:G.redText,fontSize:13,marginBottom:12}}>{ncErr}</div>}
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setScreen("dash")} style={{...btnGhost,flex:1}}>Cancelar</button>
            <button onClick={addClient} style={{...btnPrimary,flex:1}}>Crear cliente</button>
          </div>
        </div>
      </div>
    </div>
  );

  const totFact=clients.reduce((a,[,u])=>a+((allData[u.clientId]?.cierres||[]).reduce((b,r)=>b+(r.comisionMonto||0),0)),0);
  const totProc=clients.reduce((a,[,u])=>a+((allData[u.clientId]?.cierres||[]).reduce((b,r)=>b+(r.totalPesos||0),0)),0);
  return(
    <div style={{minHeight:"100vh",background:G.bg}}>
      <div style={topbar}>
        <div style={{fontWeight:700,fontSize:16,flex:1,color:G.text}}>Panel Admin</div>
        <button onClick={()=>exportConsolidado(clients,allData)} style={{...btnOutline,fontSize:12,padding:"8px 14px"}}>↓ Consolidado</button>
        <button onClick={onLogout} style={{...btnGhost,fontSize:12,padding:"8px 12px"}}>Salir</button>
      </div>
      <div style={{maxWidth:720,margin:"0 auto",padding:"20px 16px"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:24}}>
          <div style={{...card,textAlign:"center"}}>
            <div style={{fontSize:9,color:G.hint,textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:600,marginBottom:6}}>Clientes</div>
            <div style={{fontSize:32,fontWeight:800,color:G.text}}>{clients.length}</div>
          </div>
          <div style={{...card,textAlign:"center"}}>
            <div style={{fontSize:9,color:G.hint,textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:600,marginBottom:6}}>Total procesado</div>
            <div style={{fontSize:15,fontWeight:800,color:G.blue,letterSpacing:"-0.02em"}}>{fmt(totProc)}</div>
          </div>
          <div style={{...card,textAlign:"center"}}>
            <div style={{fontSize:9,color:G.hint,textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:600,marginBottom:6}}>Facturado</div>
            <div style={{fontSize:15,fontWeight:800,color:G.green,letterSpacing:"-0.02em"}}>{fmt(totFact)}</div>
          </div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <h2 style={{fontSize:16,fontWeight:700,color:G.text,margin:0}}>Clientes</h2>
          <button onClick={()=>setScreen("newclient")} style={{...btnPrimary,fontSize:13,padding:"9px 18px"}}>+ Nuevo</button>
        </div>
        {clients.length===0&&(
          <div style={{textAlign:"center",padding:"48px 0",color:G.hint}}>
            <div style={{fontSize:36,marginBottom:10}}>👥</div>
            <div style={{fontSize:15,fontWeight:600}}>Sin clientes aún</div>
            <div style={{fontSize:13,marginTop:4}}>Creá el primero con el botón de arriba</div>
          </div>
        )}
        {clients.map(([usr,udata])=>{
          const cd=allData[udata.clientId]||{cierres:[],retiros:[]};
          const cr=cd.cierres||[];
          const total=cr.reduce((a,r)=>a+(r.totalPesos||0),0);
          const com=cr.reduce((a,r)=>a+(r.comisionMonto||0),0);
          return(
            <div key={usr} className="anim" style={{...card,marginBottom:12,borderLeft:`3px solid ${G.blue}`,borderRadius:"0 14px 14px 0"}}>
              <div style={{marginBottom:12}}>
                <div style={{fontWeight:700,fontSize:16,color:G.text,marginBottom:2}}>{udata.nombre}</div>
                <div style={{fontSize:12,color:G.muted}}>@{usr} · Com. {(udata.comision*100).toFixed(2)}% · {cr.length} cierre{cr.length!==1?"s":""}</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
                <Stat label="Total procesado" value={fmt(total)} color={G.blue}/>
                <Stat label="Comisión generada" value={fmt(com)} color={G.green}/>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{setSelUsr(usr);setScreen("detail");}} style={{...btnPrimary,flex:1,fontSize:13,padding:"10px"}}>Ver cierres</button>
                <button onClick={()=>exportExcel(udata.nombre,cr,cd.retiros||[],udata.comision)} style={{...btnOutline,fontSize:13,padding:"10px 14px"}}>↓ Excel</button>
                <button onClick={()=>{if(window.confirm(`¿Eliminar a ${udata.nombre}?`)){const u={...users};delete u[usr];setUsers(u);}}} style={{...btnDanger,padding:"10px 12px"}}>✕</button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Root ──────────────────────────────────────────────────
const DEFAULT_USERS={admin:{password:"admin123",role:"admin",nombre:"Administrador"}};

function App(){
  const[session,setSession]=useState(null);
  const[users,setUsersRaw]=useState(null);
  const[allData,setDataRaw]=useState(null);
  const[apiKey,setApiKeyRaw]=useState(null);
  const[booting,setBooting]=useState(true);

  const saveUsers=useCallback(u=>{setUsersRaw(u);sSet("pn_users_v1",u);},[]);
  const saveData=useCallback(d=>{setDataRaw(d);sSet("pn_data_v1",d);},[]);
  const saveApiKey=useCallback(k=>{setApiKeyRaw(k);sSet("pn_apikey",k);},[]);

  useEffect(()=>{
    setUsersRaw(sGet("pn_users_v1")||DEFAULT_USERS);
    setDataRaw(sGet("pn_data_v1")||{});
    setApiKeyRaw(sGet("pn_apikey")||null);
    setBooting(false);
  },[]);

  if(booting)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:G.bg}}>
      <div style={{textAlign:"center"}}>
        <div style={{width:32,height:32,border:`3px solid ${G.blue}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin .8s linear infinite",margin:"0 auto 12px"}}/>
        <div style={{color:G.muted,fontSize:14}}>Cargando...</div>
      </div>
    </div>
  );

  if(!apiKey)return <ApiKeyScreen onSave={saveApiKey}/>;
  if(!session)return <Login onLogin={(u,role,cid)=>setSession({u,role,cid})} users={users}/>;

  if(session.role==="admin")return(
    <AdminView allData={allData} users={users} setUsers={saveUsers} setAllData={saveData} onLogout={()=>setSession(null)} apiKey={apiKey}/>
  );

  const udata=users[session.u];
  const clientData=allData[udata.clientId]||{cierres:[],retiros:[]};
  return(
    <ClientView clientName={udata.nombre} comisionPct={udata.comision}
      cierres={clientData.cierres||[]} retiros={clientData.retiros||[]}
      onCierresChange={c=>saveData({...allData,[udata.clientId]:{...clientData,cierres:c}})}
      onRetirosChange={r=>saveData({...allData,[udata.clientId]:{...clientData,retiros:r}})}
      onBack={null} onLogout={()=>setSession(null)} apiKey={apiKey}/>
  );
}
