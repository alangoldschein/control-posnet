<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Posnet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#08090d;--surface:#0f1117;--surface2:#161820;--surface3:#1d1f28;
    --border:#22242f;--border2:#2a2d3a;
    --accent:#3b82f6;--accent2:#60a5fa;
    --green:#22c55e;--green2:#16a34a;
    --yellow:#f59e0b;--red:#ef4444;
    --text:#f0f1f5;--text2:#8b8fa8;--text3:#4b4f65;
    --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
  }
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;font-size:14px}
  #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
  .login-box{width:360px;padding:40px}
  .login-brand{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:4px;text-transform:uppercase;margin-bottom:6px}
  .login-title{font-size:24px;font-weight:600;margin-bottom:4px}
  .login-sub{font-size:13px;color:var(--text2);margin-bottom:32px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:11px;color:var(--text2);letter-spacing:.5px;margin-bottom:5px;text-transform:uppercase}
  .field input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;transition:border-color .15s}
  .field input:focus{border-color:var(--accent)}
  .btn-login{width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:11px;font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;margin-top:4px;transition:background .15s}
  .btn-login:hover{background:var(--accent2)}
  .err{color:var(--red);font-size:12px;margin-top:10px;text-align:center;min-height:16px}
  #app{display:none;min-height:100vh}
  .sidebar{width:200px;background:var(--surface);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column}
  .sb-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
  .sb-brand{font-family:var(--mono);font-size:9px;color:var(--accent);letter-spacing:3px;text-transform:uppercase}
  .sb-title{font-size:14px;font-weight:600;margin-top:2px}
  .sb-user{padding:12px 18px;margin-bottom:8px}
  .sb-role{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
  .sb-name{font-size:12px;color:var(--text2);margin-top:2px}
  .nav{padding:0 8px}
  .nav-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .12s;margin-bottom:2px}
  .nav-item:hover{color:var(--text);background:var(--surface2)}
  .nav-item.active{color:var(--accent2);background:rgba(59,130,246,.1)}
  .nav-icon{font-size:14px;width:16px;text-align:center}
  .sb-bottom{margin-top:auto;padding:16px 18px;border-top:1px solid var(--border)}
  .btn-out{width:100%;background:transparent;border:1px solid var(--border);border-radius:7px;padding:8px;color:var(--text3);font-size:12px;cursor:pointer;font-family:var(--sans);transition:all .15s}
  .btn-out:hover{border-color:var(--red);color:var(--red)}
  .main{margin-left:200px;padding:28px 30px;min-height:100vh}
  .ph{margin-bottom:24px}
  .ph-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .ph-title{font-size:18px;font-weight:600}
  .ph-sub{font-size:12px;color:var(--text2)}
  .cards{display:grid;gap:12px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px}
  .card-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px}
  .card-row:hover{background:var(--surface2);cursor:pointer}
  .cl-info .cl-name{font-weight:600;font-size:14px}
  .cl-info .cl-meta{font-size:11px;color:var(--text2);font-family:var(--mono);margin-top:2px}
  .cl-stats{display:flex;gap:20px;align-items:center}
  .s-item{text-align:right}
  .s-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
  .s-val{font-family:var(--mono);font-size:14px;font-weight:500;margin-top:1px}
  .s-val.g{color:var(--green)}
  .s-val.y{color:var(--yellow)}
  .btn{border:none;border-radius:7px;padding:8px 14px;font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
  .btn-blue{background:var(--accent);color:#fff}.btn-blue:hover{background:var(--accent2)}
  .btn-ghost{background:var(--surface2);border:1px solid var(--border2);color:var(--text2)}.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
  .btn-green{background:var(--green2);color:#fff}.btn-green:hover{opacity:.85}
  .btn-danger{background:transparent;border:1px solid var(--border);color:var(--text3);font-size:11px}.btn-danger:hover{border-color:var(--red);color:var(--red)}
  .btn-sm{padding:5px 10px;font-size:11px}
  .back-btn{display:flex;align-items:center;gap:5px;color:var(--text2);font-size:12px;cursor:pointer;background:none;border:none;font-family:var(--sans);margin-bottom:16px;padding:0}
  .back-btn:hover{color:var(--accent)}
  .tabs{display:flex;gap:3px;margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px;width:fit-content}
  .tab{padding:6px 16px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--text2);transition:all .15s;border:none;background:transparent;font-family:var(--sans)}
  .tab.active{background:var(--accent);color:#fff;font-weight:500}
  .upload-zone{border:2px dashed var(--border2);border-radius:10px;padding:36px;text-align:center;cursor:pointer;transition:all .15s;background:var(--surface)}
  .upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:var(--surface2)}
  .upload-icon{font-size:32px;margin-bottom:10px}
  .upload-text{font-size:13px;color:var(--text2)}
  .upload-sub{font-size:11px;color:var(--text3);margin-top:3px}
  #file-input{display:none}
  .confirm-card{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:20px;margin-bottom:12px}
  .confirm-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .confirm-fields{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
  .cf-field{background:var(--surface2);border-radius:7px;padding:10px 12px}
  .cf-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
  .cf-input{width:100%;background:transparent;border:none;color:var(--text);font-family:var(--mono);font-size:15px;font-weight:500;outline:none}
  .cf-input:focus{color:var(--accent2)}
  .cf-total{grid-column:span 2;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:7px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center}
  .cf-total-label{font-size:11px;color:var(--green);text-transform:uppercase;letter-spacing:.5px}
  .cf-total-val{font-family:var(--mono);font-size:18px;font-weight:600;color:var(--green)}
  .confirm-actions{display:flex;gap:8px;justify-content:flex-end}
  .cierre-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:8px}
  .cierre-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .12s}
  .cierre-header:hover{background:var(--surface2)}
  .cierre-left{display:flex;align-items:center;gap:12px}
  .trm-badge{font-family:var(--mono);font-size:10px;color:var(--accent2);background:rgba(59,130,246,.1);padding:3px 7px;border-radius:4px;border:1px solid rgba(59,130,246,.2)}
  .cierre-info .ci-title{font-size:13px;font-weight:500}
  .cierre-info .ci-date{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:1px}
  .cierre-right{display:flex;gap:16px;align-items:center}
  .ca{text-align:right}
  .ca-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}
  .ca-val{font-family:var(--mono);font-size:13px;font-weight:500;margin-top:1px}
  .ca-val.g{color:var(--green)}
  .cierre-body{padding:14px 16px;border-top:1px solid var(--border);display:none}
  .cierre-body.open{display:block}
  .detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
  .detail-box{background:var(--bg);border-radius:7px;padding:10px 12px}
  .db-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}
  .db-val{font-family:var(--mono);font-size:15px;font-weight:500;margin-top:3px}
  .acred-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .abadge{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border2);border-radius:16px;padding:4px 10px;font-size:11px}
  .abadge.ok{border-color:rgba(34,197,94,.3);color:var(--green)}
  .abadge.pend{border-color:rgba(245,158,11,.3);color:var(--yellow)}
  .dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
  .fin-header{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
  .fin-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
  .fin-card.highlight{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.04)}
  .fin-card.blue{border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.04)}
  .fin-card.yellow{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.04)}
  .fin-card.red{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.04)}
  .fc-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .fc-val{font-family:var(--mono);font-size:20px;font-weight:600}
  .fc-val.g{color:var(--green)}
  .fc-val.b{color:var(--accent2)}
  .fc-val.y{color:var(--yellow)}
  .fc-val.r{color:var(--red)}
  .fc-sub{font-size:11px;color:var(--text3);margin-top:3px}
  .fin-section{margin-bottom:20px}
  .fin-section-title{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .fin-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
  .timeline{display:grid;gap:6px}
  .tl-row{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center}
  .tl-row.past{opacity:.55}
  .tl-row.today{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.04)}
  .tl-left .tl-date{font-family:var(--mono);font-size:12px;font-weight:500}
  .tl-left .tl-desc{font-size:11px;color:var(--text2);margin-top:2px}
  .tl-right{display:flex;align-items:center;gap:10px}
  .tl-amt{font-family:var(--mono);font-size:14px;font-weight:600}
  .badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 7px;border-radius:10px}
  .badge.g{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2)}
  .badge.y{background:rgba(245,158,11,.1);color:var(--yellow);border:1px solid rgba(245,158,11,.2)}
  .badge.b{background:rgba(59,130,246,.1);color:var(--accent2);border:1px solid rgba(59,130,246,.2)}
  .pago-form{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
  .pago-form-title{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
  .pago-inputs{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
  .pago-inputs .field{margin:0;flex:1;min-width:120px}
  .pagos-list{display:grid;gap:6px}
  .pago-row{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
  .pr-info .pr-date{font-size:11px;color:var(--text3);font-family:var(--mono)}
  .pr-info .pr-desc{font-size:12px;margin-top:1px}
  .pr-monto{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--red)}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:24px;width:100%;max-width:400px}
  .modal-title{font-size:15px;font-weight:600;margin-bottom:18px}
  .modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
  .spinner{width:12px;height:12px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:13px}
  .empty-icon{font-size:28px;margin-bottom:8px}
  .toast{position:fixed;bottom:20px;right:20px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:10px 16px;font-size:12px;z-index:200;display:none}
  .toast.show{display:block}
  .toast.ok{border-color:var(--green);color:var(--green)}
  .toast.err{border-color:var(--red);color:var(--red)}
  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-brand">Control</div>
    <div class="login-title">Posnet B</div>
    <div class="login-sub">Sistema de gestión de cierres</div>
    <div class="field"><label>Usuario</label><input type="text" id="login-user" autocomplete="off"></div>
    <div class="field"><label>Contraseña</label><input type="password" id="login-pass"></div>
    <button class="btn-login" onclick="doLogin()">Ingresar</button>
    <div class="err" id="login-err"></div>
  </div>
</div>

<div id="app">
  <div class="sidebar">
    <div class="sb-logo">
      <div class="sb-brand">Control</div>
      <div class="sb-title">Posnet B</div>
    </div>
    <div class="sb-user">
      <div class="sb-role" id="sb-role"></div>
      <div class="sb-name" id="sb-name"></div>
    </div>
    <div class="nav">
      <div class="nav-item active" onclick="showSection('cierres')" id="nav-cierres"><span class="nav-icon">📋</span> Cierres</div>
      <div class="nav-item" onclick="showSection('financiero')" id="nav-financiero"><span class="nav-icon">💰</span> Financiero</div>
      <div class="nav-item" onclick="showSection('clientes')" id="nav-clientes" style="display:none"><span class="nav-icon">👥</span> Clientes</div>
    </div>
    <div class="sb-bottom"><button class="btn-out" onclick="doLogout()">Cerrar sesión</button></div>
  </div>
  <div class="main" id="main-content"></div>
</div>

<div class="modal-overlay" id="modal-cliente">
  <div class="modal">
    <div class="modal-title">Nuevo cliente</div>
    <div class="field"><label>Nombre</label><input type="text" id="nc-nombre"></div>
    <div class="field"><label>Usuario</label><input type="text" id="nc-user"></div>
    <div class="field"><label>Contraseña</label><input type="text" id="nc-pass"></div>
    <div class="field"><label>Comisión (%)</label><input type="number" id="nc-comision" placeholder="9.5" step="0.1"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-blue" onclick="saveNewClient()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://wwoymrlwsagwqakxxujk.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3b3ltcmx3c2Fnd3Fha3h4dWprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0OTg2NTEsImV4cCI6MjA5MzA3NDY1MX0.f-d6mzXafLNzw6nYM_Ijjq7vNESw_UdRkv8VgxLPuQg';
let session=null,currentSection='cierres',viewingClientId=null;

async function sb(path,opts={}){
  const{headers:eh,...rest}=opts;
  const r=await fetch(SUPABASE_URL+'/rest/v1/'+path,{...rest,headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,...(eh||{})}});
  if(!r.ok){const e=await r.text();throw new Error(e);}
  return r.status===204?null:r.json();
}
const db={
  getUser:u=>sb(`users?username=eq.${u}&select=*`),
  getAllUsers:()=>sb('users?role=eq.client&select=*&order=nombre.asc'),
  insertUser:d=>sb('users',{method:'POST',headers:{'Prefer':'return=representation'},body:JSON.stringify(d)}),
  getCierres:cid=>sb(`cierres?client_id=eq.${cid}&select=*&order=fecha.desc,hora.desc`),
  insertCierre:d=>sb('cierres',{method:'POST',headers:{'Prefer':'return=representation'},body:JSON.stringify(d)}),
  deleteCierre:id=>sb(`cierres?id=eq.${id}`,{method:'DELETE'}),
  getRetiros:cid=>sb(`retiros?client_id=eq.${cid}&select=*&order=fecha.desc`),
  insertRetiro:d=>sb('retiros',{method:'POST',headers:{'Prefer':'return=representation'},body:JSON.stringify(d)}),
  deleteRetiro:id=>sb(`retiros?id=eq.${id}`,{method:'DELETE'}),
};

async function doLogin(){
  const u=document.getElementById('login-user').value.trim();
  const p=document.getElementById('login-pass').value.trim();
  if(!u||!p)return;
  try{
    const rows=await db.getUser(u);
    if(!rows||!rows[0])return showErr('Usuario no encontrado');
    if(rows[0].password!==p)return showErr('Contraseña incorrecta');
    session=rows[0];startApp();
  }catch(e){showErr('Error: '+e.message);}
}
function showErr(m){document.getElementById('login-err').textContent=m;}
document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function startApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('sb-role').textContent=session.role==='admin'?'Administrador':'Cliente';
  document.getElementById('sb-name').textContent=session.nombre;
  if(session.role==='admin'){document.getElementById('nav-clientes').style.display='flex';showSection('clientes');}
  else showSection('cierres');
}
function doLogout(){
  session=null;viewingClientId=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
  document.getElementById('login-err').textContent='';
}
function showSection(sec){
  currentSection=sec;
  ['cierres','financiero','clientes'].forEach(s=>{
    const el=document.getElementById('nav-'+s);
    if(el)el.classList.toggle('active',s===sec);
  });
  renderSection();
}
async function renderSection(){
  const el=document.getElementById('main-content');
  el.innerHTML='<div class="empty"><div class="spinner"></div></div>';
  const cid=viewingClientId||(session.role==='client'?session.client_id:null);
  try{
    if(currentSection==='clientes'&&session.role==='admin')await renderClientes(el);
    else if(currentSection==='cierres'){const c=cid?await db.getCierres(cid):[];renderCierres(el,c,cid);}
    else if(currentSection==='financiero'){
      const c=cid?await db.getCierres(cid):[];
      const r=cid?await db.getRetiros(cid):[];
      renderFinanciero(el,c,r,cid);
    }
  }catch(e){el.innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div>${e.message}</div>`;}
}

async function renderClientes(el){
  const users=await db.getAllUsers();
  let html=`<div class="ph"><div class="ph-top"><div><div class="ph-title">Clientes</div><div class="ph-sub">${users.length} activos</div></div><button class="btn btn-blue" onclick="openModal()">+ Nuevo cliente</button></div></div><div class="cards">`;
  if(!users.length)html+=`<div class="empty"><div class="empty-icon">👥</div>No hay clientes aún.</div>`;
  for(const u of users){
    let cierres=[],retiros=[];
    try{cierres=await db.getCierres(u.client_id);}catch(e){}
    try{retiros=await db.getRetiros(u.client_id);}catch(e){}
    const hoy=todayStr();
    const ac=calcAcreditado(cierres,hoy);
    const tr=retiros.reduce((s,r)=>s+parseFloat(r.monto||0),0);
    const saldo=ac-tr;
    const pend=calcPendiente(cierres,hoy);
    html+=`<div class="card"><div class="card-row" onclick="verCliente('${u.client_id}','${u.nombre}',${u.comision})">
      <div class="cl-info"><div class="cl-name">${u.nombre}</div><div class="cl-meta">@${u.username} · ${(u.comision*100).toFixed(1)}% comisión</div></div>
      <div class="cl-stats">
        <div class="s-item"><div class="s-lbl">Saldo</div><div class="s-val g">${fmt(saldo)}</div></div>
        <div class="s-item"><div class="s-lbl">Pendiente</div><div class="s-val y">${fmt(pend)}</div></div>
        <button class="btn btn-ghost btn-sm">Ver →</button>
      </div></div></div>`;
  }
  html+='</div>';el.innerHTML=html;
}
function verCliente(cid,nombre,comision){viewingClientId=cid;session._vNombre=nombre;session._vComision=comision;showSection('cierres');}
function goBack(){viewingClientId=null;session._vNombre=null;session._vComision=null;showSection('clientes');}

              <div class="ci-date">${c.fecha||''} ${c.hora||''}</div>
            </div>
          </div>
          <div class="cierre-right">
            <div class="ca"><div class="ca-lbl">Neto</div><div class="ca-val g">${fmt(neto)}</div></div>

            <span style="color:var(--text3);font-size:11px">▾</span>
          </div>
        </div>

          <div class="detail-grid">
            <div class="detail-box"><div class="db-label">QR / Débito</div><div class="db-val">${fmt(c.qr_debito||0)}</div></div>
            <div class="detail-box"><div class="db-label">Crédito</div><div class="db-val">${fmt(c.credito||0)}</div></div>
            <div class="detail-box"><div class="db-label">Total bruto</div><div class="db-val">${fmt(c.total_pesos||0)}</div></div>
          </div>
          <div class="acred-row">
            <div class="abadge ${qrOk?'ok':'pend'}"><div class="dot"></div>QR/Déb · ${c.fecha_acred_qr||'—'} ${qrOk?'✓':'pendiente'}</div>

      <div class="upload-text">Hacé clic o arrastrá las fotos de los cierres</div>
      <div class="upload-sub">JPG, PNG · Varios a la vez</div>
    </div>
    <input type="file" id="file-input" accept="image/*" multiple onchange="handleFiles(this.files,'${cid}',${comision})">

}

function toggleCierre(id){const el=document.getElementById(id);if(el)el.classList.toggle('open');}
function switchTab(btn,tabId){
  btn.closest('.tabs').querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-lista').style.display=tabId==='tab-lista'?'block':'none';
  document.getElementById('tab-subir').style.display=tabId==='tab-subir'?'block':'none';
}
async function delCierre(id){
  if(!confirm('¿Eliminar?'))return;
  try{await db.deleteCierre(id);showToast('Eliminado','ok');renderSection();}
  catch(e){showToast(e.message,'err');}
}

function handleDrop(e){
  e.preventDefault();e.currentTarget.classList.remove('drag');
  const cid=viewingClientId||(session.client_id||'');
  const com=session.role==='client'?session.comision:(session._vComision||0.095);
  handleFiles(e.dataTransfer.files,cid,com);
}

async function handleFiles(files,cid,comision){
  const list=document.getElementById('confirm-list');
  if(!list)return;
  for(const file of files){
    const uid='cf-'+Date.now()+Math.random().toString(36).slice(2);
    const div=document.createElement('div');
    div.className='confirm-card';div.id=uid;
    div.innerHTML=`<div class="confirm-title"><span class="spinner"></span> Leyendo ${file.name}...</div>`;
    list.appendChild(div);
    try{
      const base64=await toBase64(file);
      const data=await extractFromImage(base64,file.type);
      renderConfirmCard(div,data,cid,comision,file.name);
    }catch(e){
      div.innerHTML=`<div class="confirm-title" style="color:var(--red)">❌ Error: ${e.message}</div>`;
    }
  }
}

function renderConfirmCard(div,data,cid,comision,filename){
  const total=parseFloat(data.totalPesos||0);
  const comMonto=Math.round(total*comision);
  const neto=total-comMonto;
  div.innerHTML=`
    <div class="confirm-title">✓ ${filename} — revisá y confirmá</div>
    <div class="confirm-fields">
      <div class="cf-field"><div class="cf-label">Terminal</div><input class="cf-input" id="${div.id}-terminal" value="${data.terminal||''}"></div>
      <div class="cf-field"><div class="cf-label">Fecha</div><input class="cf-input" id="${div.id}-fecha" value="${data.fecha||''}"></div>
      <div class="cf-field"><div class="cf-label">Hora</div><input class="cf-input" id="${div.id}-hora" value="${data.hora||''}"></div>
      <div class="cf-field"><div class="cf-label">N° Lote</div><input class="cf-input" id="${div.id}-lote" value="${data.nroLote||''}"></div>
      <div class="cf-field"><div class="cf-label">QR / Débito $</div><input class="cf-input" type="number" id="${div.id}-qr" value="${data.qrDebito||0}" oninput="recalcTotal('${div.id}',${comision})"></div>
      <div class="cf-field"><div class="cf-label">Crédito $</div><input class="cf-input" type="number" id="${div.id}-cred" value="${data.credito||0}" oninput="recalcTotal('${div.id}',${comision})"></div>
      <div class="cf-total">
        <div>
          <div class="cf-total-label">Neto a cobrar</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">Bruto: <span id="${div.id}-bruto">${fmt(total)}</span> · Comisión (${(comision*100).toFixed(1)}%): <span id="${div.id}-com">${fmt(comMonto)}</span></div>
        </div>
        <div class="cf-total-val" id="${div.id}-neto">${fmt(neto)}</div>
      </div>
    </div>
    <div class="confirm-actions">
      <button class="btn btn-ghost btn-sm" onclick="this.closest('.confirm-card').remove()">Descartar</button>
      <button class="btn btn-green btn-sm" onclick="guardarCierre('${div.id}','${cid}',${comision})">✓ Guardar cierre</button>
    </div>`;
}

function recalcTotal(uid,comision){
  const qr=parseFloat(document.getElementById(uid+'-qr').value)||0;
  const cred=parseFloat(document.getElementById(uid+'-cred').value)||0;
  const total=qr+cred;
  const comMonto=Math.round(total*comision);
  const neto=total-comMonto;
  document.getElementById(uid+'-bruto').textContent=fmt(total);
  document.getElementById(uid+'-com').textContent=fmt(comMonto);
  document.getElementById(uid+'-neto').textContent=fmt(neto);
}

async function guardarCierre(uid,cid,comision){
  const terminal=document.getElementById(uid+'-terminal').value;
  const fecha=document.getElementById(uid+'-fecha').value;
  const hora=document.getElementById(uid+'-hora').value;
  const lote=document.getElementById(uid+'-lote').value;
  const qr=parseFloat(document.getElementById(uid+'-qr').value)||0;
  const cred=parseFloat(document.getElementById(uid+'-cred').value)||0;
  const total=qr+cred;
  const comMonto=Math.round(total*comision);
  const neto=total-comMonto;
  const fechaAcredQr=qr>0?addDays(fecha,2):'';
  const fechaAcredCred=cred>0?addDays(fecha,18):'';
  try{
    await db.insertCierre({client_id:cid,terminal,fecha,hora,nro_lote:lote,nro_comercio:'',qr_debito:qr,credito:cred,total_pesos:total,comision_pct:comision,comision_monto:comMonto,saldo_neto:neto,fecha_acred_qr:fechaAcredQr,fecha_acred_credito:fechaAcredCred});
    document.getElementById(uid).remove();
    showToast('Cierre guardado','ok');
  }catch(e){showToast(e.message,'err');}
}

async function extractFromImage(base64,mediaType){
  const resp=await fetch('/api/claude',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',max_tokens:600,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
        {type:'text',text:`Lee este ticket de cierre de lote de posnet argentino. Responde SOLO con JSON valido sin texto extra ni backticks:
{"terminal":"numero","fecha":"DD/MM/YYYY","hora":"HH:MM:SS","nroLote":"numero","nroComercio":"","qrDebito":numero,"credito":numero,"totalPesos":numero}
- qrDebito: suma VISA DEBITO + MASTERCARD PREPAGO + QR + TRANSFERENCIA INMEDIATA
- credito: MASTERCARD credito + VISA credito + AMEX (excluir debito/prepago/QR)
- totalPesos: suma qrDebito + credito
- Numeros sin $ ni puntos. Ausentes = 0 o "".`}
      ]}]
    })
  });
  if(!resp.ok){const e=await resp.text();throw new Error('API '+resp.status+': '+e);}
  const r=await resp.json();
  if(!r.content?.length)throw new Error('Respuesta vacía');
  const text=r.content.map(b=>b.text||'').join('');
  return JSON.parse(text.replace(/```json|```/g,'').trim());
}

function renderFinanciero(el,cierres,retiros,cid){
  const hoy=todayStr();
  const nombre=session.role==='client'?session.nombre:session._vNombre;
  const comision=session.role==='client'?session.comision:(session._vComision||0.095);
  const acHoy=calcAcreditado(cierres,hoy);
  const pendiente=calcPendiente(cierres,hoy);
  const totalPagos=retiros.reduce((s,r)=>s+parseFloat(r.monto||0),0);
  const saldo=acHoy-totalPagos;
  const totalBruto=cierres.reduce((s,c)=>s+parseFloat(c.total_pesos||0),0);
  const totalComision=cierres.reduce((s,c)=>s+parseFloat(c.comision_monto||0),0);

  let html='';
  if(session.role==='admin'&&viewingClientId){
    html+=`<button class="back-btn" onclick="goBack()">← Clientes</button>
    <div class="ph"><div class="ph-top"><div><div class="ph-title">Financiero · ${nombre}</div><div class="ph-sub">Comisión: ${(comision*100).toFixed(1)}%</div></div></div></div>`;
  }else{
    html+=`<div class="ph"><div class="ph-top"><div><div class="ph-title">Resumen financiero</div></div></div></div>`;
  }

  html+=`<div class="fin-header">
    <div class="fin-card highlight"><div class="fc-label">Saldo disponible</div><div class="fc-val g">${fmt(saldo)}</div><div class="fc-sub">Acreditado menos pagos</div></div>
    <div class="fin-card blue"><div class="fc-label">Acreditado a hoy</div><div class="fc-val b">${fmt(acHoy)}</div><div class="fc-sub">Neto ya en cuenta</div></div>
    <div class="fin-card yellow"><div class="fc-label">Pendiente de cobro</div><div class="fc-val y">${fmt(pendiente)}</div><div class="fc-sub">Próximas acreditaciones</div></div>
    <div class="fin-card red"><div class="fc-label">Total pagado</div><div class="fc-val r">${fmt(totalPagos)}</div><div class="fc-sub">Retiros registrados</div></div>
  </div>`;

  html+=`<div class="fin-section"><div class="fin-section-title">Resumen de comisiones</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
      <div class="fin-card"><div class="fc-label">Total bruto</div><div class="fc-val" style="font-size:16px">${fmt(totalBruto)}</div></div>
      <div class="fin-card red"><div class="fc-label">Comisión cueva (${(comision*100).toFixed(1)}%)</div><div class="fc-val r" style="font-size:16px">- ${fmt(totalComision)}</div></div>
      <div class="fin-card highlight"><div class="fc-label">Neto total</div><div class="fc-val g" style="font-size:16px">${fmt(totalBruto-totalComision)}</div></div>
    </div>
  </div>`;

  const eventos=[];
  for(const c of cierres){
    const com=parseFloat(c.comision_pct||0);
    if(c.qr_debito>0&&c.fecha_acred_qr)eventos.push({fecha:c.fecha_acred_qr,monto:parseFloat(c.qr_debito)-Math.round(parseFloat(c.qr_debito)*com),tipo:'QR/Débito',terminal:c.terminal,lote:c.nro_lote});
    if(c.credito>0&&c.fecha_acred_credito)eventos.push({fecha:c.fecha_acred_credito,monto:parseFloat(c.credito)-Math.round(parseFloat(c.credito)*com),tipo:'Crédito',terminal:c.terminal,lote:c.nro_lote});
  }
  const byFecha={};
  for(const e of eventos){if(!byFecha[e.fecha])byFecha[e.fecha]={total:0,items:[]};byFecha[e.fecha].total+=e.monto;byFecha[e.fecha].items.push(e);}
  const fechas=Object.keys(byFecha).sort();

  html+=`<div class="fin-section"><div class="fin-section-title">Calendario de acreditaciones</div><div class="timeline">`;
  if(!fechas.length)html+=`<div class="empty" style="padding:24px"><div class="empty-icon">📅</div>Sin cobros proyectados</div>`;
  for(const f of fechas){
    const past=f<hoy;const isToday=f===hoy;
    const gr=byFecha[f];
    const detail=gr.items.map(i=>`TRM ${i.terminal} · ${i.tipo}`).join(' / ');
    const cls=isToday?'today':past?'past':'';
    const badge=isToday?`<span class="badge b">Hoy</span>`:past?`<span class="badge g">✓</span>`:`<span class="badge y">Pendiente</span>`;
    html+=`<div class="tl-row ${cls}"><div class="tl-left"><div class="tl-date">${formatFecha(f)}</div><div class="tl-desc">${detail}</div></div>
      <div class="tl-right"><div class="tl-amt">${fmt(gr.total)}</div>${badge}</div></div>`;
  }
  html+=`</div></div>`;

  html+=`<div class="fin-section"><div class="fin-section-title">Pagos recibidos</div>
    <div class="pago-form"><div class="pago-form-title">Registrar pago de la cueva</div>
      <div class="pago-inputs">
        <div class="field"><label>Fecha</label><input type="date" id="ret-fecha" value="${hoy}"></div>
        <div class="field"><label>Monto $</label><input type="number" id="ret-monto" placeholder="0"></div>
        <div class="field" style="flex:2"><label>Descripción</label><input type="text" id="ret-desc" placeholder="Pago cueva, retiro, etc."></div>
        <button class="btn btn-green" onclick="addRetiro('${cid}')">Registrar</button>
      </div>
    </div>
    <div class="pagos-list">`;
  if(!retiros.length)html+=`<div class="empty" style="padding:20px"><div class="empty-icon">💸</div>Sin pagos registrados</div>`;
  for(const r of retiros){
    html+=`<div class="pago-row"><div class="pr-info"><div class="pr-date">${r.fecha||''}</div><div class="pr-desc">${r.descripcion||'Pago'}</div></div>
      <div style="display:flex;align-items:center;gap:10px"><div class="pr-monto">- ${fmt(r.monto)}</div><button class="btn btn-danger btn-sm" onclick="delRetiro('${r.id}')">×</button></div></div>`;
  }
  html+=`</div></div>`;
  el.innerHTML=html;
}

async function addRetiro(cid){
  const fecha=document.getElementById('ret-fecha').value;
  const monto=parseFloat(document.getElementById('ret-monto').value);
  const desc=document.getElementById('ret-desc').value.trim()||'Pago';
  if(!fecha||!monto||monto<=0)return showToast('Completá fecha y monto','err');
  try{await db.insertRetiro({client_id:cid,fecha,monto,descripcion:desc});showToast('Pago registrado','ok');renderSection();}
  catch(e){showToast(e.message,'err');}
}
async function delRetiro(id){
  if(!confirm('¿Eliminar?'))return;
  try{await db.deleteRetiro(id);showToast('Eliminado','ok');renderSection();}
  catch(e){showToast(e.message,'err');}
}

function openModal(){document.getElementById('modal-cliente').classList.add('open');}
function closeModal(){document.getElementById('modal-cliente').classList.remove('open');}
async function saveNewClient(){
  const nombre=document.getElementById('nc-nombre').value.trim();

  }catch(e){showToast(e.message,'err');}

function toBase64(file){return new Promise((r,j)=>{const fr=new FileReader();fr.onload=()=>r(fr.result.split(',')[1]);fr.onerror=()=>j(new Error('Error'));fr.readAsDataURL(file);});}
function todayStr(){return new Date().toISOString().split('T')[0];}
function addDays(fechaDDMMYYYY,days){
  if(!fechaDDMMYYYY)return'';
  let d;
  if(fechaDDMMYYYY.includes('/')){const[dd,mm,yyyy]=fechaDDMMYYYY.split('/');d=new Date(parseInt(yyyy),parseInt(mm)-1,parseInt(dd));}
  else d=new Date(fechaDDMMYYYY);
  d.setDate(d.getDate()+days);return d.toISOString().split('T')[0];
}
function fmt(n){return'$'+Math.round(n).toLocaleString('es-AR');}
function formatFecha(iso){
  if(!iso)return'—';
  const[y,m,d]=iso.split('-');
  const ms=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return`${d} ${ms[parseInt(m)-1]} ${y}`;
}
function calcAcreditado(cierres,hoy){
  let t=0;
  for(const c of cierres){
    const com=parseFloat(c.comision_pct||0);
    if(c.fecha_acred_qr&&c.fecha_acred_qr<=hoy)t+=parseFloat(c.qr_debito||0)-Math.round(parseFloat(c.qr_debito||0)*com);
    if(c.fecha_acred_credito&&c.fecha_acred_credito<=hoy)t+=parseFloat(c.credito||0)-Math.round(parseFloat(c.credito||0)*com);
  }
  return t;
}
function calcPendiente(cierres,hoy){
  let t=0;
  for(const c of cierres){
    const com=parseFloat(c.comision_pct||0);
    if(c.fecha_acred_qr&&c.fecha_acred_qr>hoy)t+=parseFloat(c.qr_debito||0)-Math.round(parseFloat(c.qr_debito||0)*com);
    if(c.fecha_acred_credito&&c.fecha_acred_credito>hoy)t+=parseFloat(c.credito||0)-Math.round(parseFloat(c.credito||0)*com);
  }
  return t;
}
function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+type;
  setTimeout(()=>t.classList.remove('show'),3000);
}
