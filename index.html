async function supaFetch(path, options={}) {
  const res = await fetch(`${SUPA_URL}/rest/v1${path}`, {
    ...options,
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPA_KEY,
      "Authorization": `Bearer ${SUPA_KEY}`,
      "Prefer": options.prefer || "",
      ...options.headers
    }
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ── Utils ─────────────────────────────────────────────────
function addDays(s,d){if(!s)return"";const[dd,mm,yy]=s.split("/");if(!dd||!mm||!yy)return"";const dt=new Date(`${yy}-${mm}-${dd}`);if(isNaN(dt))return"";dt.setDate(dt.getDate()+d);return dt.toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"});}
function toMs(s){if(!s)return 0;const[d,m,y]=s.split("/");return new Date(`${y}-${m}-${d}`).getTime()}
function hoy(){return new Date().toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"})}
const fmt=n=>new Intl.NumberFormat("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0}).format(n||0);

function sortCierres(arr){
  return[...arr].sort((a,b)=>{
    const dd=toMs(b.fecha)-toMs(a.fecha);
    if(dd!==0)return dd;
    const ts=h=>{if(!h)return 0;const[hh,mm,ss]=h.split(":");return+hh*3600+ +mm*60+ +(ss||0)};
    return ts(b.hora)-ts(a.hora);
  });
}

function calcCierre(raw){
  const qr=parseFloat(raw.qr_debito||raw.qrDebito)||0;
  const cred=parseFloat(raw.credito)||0;
  const total=parseFloat(raw.total_pesos||raw.totalPesos)||(qr+cred);
  const pct=parseFloat(raw.comision_pct||raw.comisionPct)||0.095;
  const com=Math.round(total*pct);
  return{
    ...raw,
    qrDebito:qr, credito:cred, totalPesos:total,
    comisionPct:pct, comisionMonto:com, saldoNeto:total-com,
    fechaAcredQR:qr>0?addDays(raw.fecha,3):"",
    fechaAcredCredito:cred>0?addDays(raw.fecha,18):"",
  };
}

function mapCierreFromDB(r){
  return calcCierre({

}

  };
}

async function extractFromImage(base64,mediaType,apiKey){
  const resp=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({
      model:"claude-sonnet-4-6",max_tokens:600,
      messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:mediaType,data:base64}},
        {type:"text",text:`Lee este ticket de cierre de lote de posnet argentino. Responde SOLO con JSON valido sin texto extra:\n{\"terminal\":\"numero de terminal\",\"fecha\":\"DD/MM/YYYY\",\"hora\":\"HH:MM:SS\",\"nroLote\":\"numero de lote\",\"nroComercio\":\"numero si aparece\",\"qrDebito\":numero,\"credito\":numero,\"totalPesos\":numero}\n- hora: del encabezado del ticket\n- qrDebito: suma VISA DEBITO + MASTERCARD PREPAGO + QR + TRANSFERENCIA INMEDIATA (todo lo que diga debito, prepago o transferencia)\n- credito: MASTERCARD credito + VISA credito + AMEX (excluir debito/prepago/transferencia)\n- totalPesos: TOTALES EN PESOS (linea Co 0XX al final)\n- Numeros sin $ ni puntos de miles. Campos ausentes = 0 o \"\".`}
      ]}]
    })
  });
  const data=await resp.json();
  const text=data.content?.find(b=>b.type==="text")?.text||"{}";
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(",")[1]);
    r.onerror=()=>rej(new Error("Error"));
    r.readAsDataURL(file);
  });
}

// ── Excel ─────────────────────────────────────────────────
function exportExcel(clientName,cierres,retiros,comisionPct){
  const wb=XLSX.utils.book_new();
  const h1=["Terminal","Fecha","Hora","Lote","Comercio","QR/Debito","Credito","Total","Comision%","Comision$","Saldo","AcredQR","AcredCred"];
  const d1=sortCierres(cierres).map(r=>[r.terminal,r.fecha,r.hora||"",r.nroLote,r.nroComercio||"",r.qrDebito,r.credito,r.totalPesos,r.comisionPct,r.comisionMonto,r.saldoNeto,r.fechaAcredQR,r.fechaAcredCredito]);
  const tot=["TOTALES","","","","",cierres.reduce((a,r)=>a+(r.qrDebito||0),0),cierres.reduce((a,r)=>a+(r.credito||0),0),cierres.reduce((a,r)=>a+(r.totalPesos||0),0),comisionPct,cierres.reduce((a,r)=>a+(r.comisionMonto||0),0),cierres.reduce((a,r)=>a+(r.saldoNeto||0),0),"",""];
  const ws1=XLSX.utils.aoa_to_sheet([h1,...d1,tot]);
  ws1["!cols"]=h1.map((_,i)=>({wch:i<5?13:18}));
  XLSX.utils.book_append_sheet(wb,ws1,"Cierres");
  const acredMap={};
  cierres.forEach(c=>{
    const add=(fecha,monto,tipo)=>{if(!fecha||!monto)return;if(!acredMap[fecha])acredMap[fecha]={qr:0,cred:0};acredMap[fecha][tipo]+=Math.round(monto-monto*c.comisionPct);};
    if(c.qrDebito>0)add(c.fechaAcredQR,c.qrDebito,"qr");
    if(c.credito>0)add(c.fechaAcredCredito,c.credito,"cred");
  });
  const hoyMs=toMs(hoy());
  const h2=["Fecha","QR/Debito","Credito","Total","Estado"];
  const d2=Object.entries(acredMap).sort(([a],[b])=>toMs(a)-toMs(b)).map(([f,{qr,cred}])=>[f,qr,cred,qr+cred,toMs(f)<=hoyMs?"Acreditado":"Pendiente"]);
  const ws2=XLSX.utils.aoa_to_sheet([h2,...d2]);
  XLSX.utils.book_append_sheet(wb,ws2,"Calendario");
  const h3=["Tipo","Fecha","Descripcion","Monto","Saldo acumulado"];
  const movs=[];let saldo=0;
  Object.entries(acredMap).sort(([a],[b])=>toMs(a)-toMs(b)).forEach(([f,{qr,cred}])=>{if(toMs(f)>hoyMs)return;saldo+=qr+cred;movs.push(["Acreditacion",f,"",qr+cred,saldo]);});
  [...retiros].sort((a,b)=>toMs(a.fecha)-toMs(b.fecha)).forEach(r=>{saldo-=r.monto;movs.push(["Retiro",r.fecha,r.descripcion||"",-r.monto,saldo])});
  const ws3=XLSX.utils.aoa_to_sheet([h3,...movs]);
  XLSX.utils.book_append_sheet(wb,ws3,"Cuenta corriente");
  XLSX.writeFile(wb,`Cierres_${clientName.replace(/\s+/g,"_")}.xlsx`);
}

  const[u,setU]=useState("");const[p,setP]=useState("");const[err,setErr]=useState("");const[loading,setLoading]=useState(false);

    setLoading(true);setErr("");

      if(!rows||rows.length===0||rows[0].password!==p){setErr("Usuario o contrasena incorrectos");setLoading(false);return;}
      const usr=rows[0];

// ── Tab Calendario ─────────────────────────────────────────
function TabCalendario({cierres}){
  const map={};
  cierres.forEach(c=>{
    const add=(fecha,monto,tipo,terminal,lote)=>{if(!fecha||!monto)return;if(!map[fecha])map[fecha]={qr:0,cred:0,items:[]};const neto=Math.round(monto-monto*c.comisionPct);map[fecha][tipo]+=neto;map[fecha].items.push({terminal,lote,tipo,monto:neto});};
    if(c.qrDebito>0)add(c.fechaAcredQR,c.qrDebito,"qr",c.terminal,c.nroLote);
    if(c.credito>0)add(c.fechaAcredCredito,c.credito,"cred",c.terminal,c.nroLote);
  });
  const dias=Object.entries(map).sort(([a],[b])=>toMs(a)-toMs(b));
  const hoyMs=toMs(hoy());
  const totAcred=dias.filter(([f])=>toMs(f)<=hoyMs).reduce((a,[,v])=>a+v.qr+v.cred,0);
  const totPend=dias.filter(([f])=>toMs(f)>hoyMs).reduce((a,[,v])=>a+v.qr+v.cred,0);
  return(<div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
      <div style={{...card}}><div style={{fontSize:10,color:G.hint,textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:600,marginBottom:4}}>Ya acreditado</div><div style={{fontSize:20,fontWeight:800,color:G.green}}>{fmt(totAcred)}</div></div>
      <div style={{...card}}><div style={{fontSize:10,color:G.hint,textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:600,marginBottom:4}}>Por acreditar</div><div style={{fontSize:20,fontWeight:800,color:G.amber}}>{fmt(totPend)}</div></div>
    </div>
    {dias.map(([fecha,data])=>{
      const pasado=toMs(fecha)<=hoyMs;const total=data.qr+data.cred;
      return(<div key={fecha} style={{...card,marginBottom:10,borderLeft:`3px solid ${pasado?G.green:G.border}`,borderRadius:"0 14px 14px 0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:data.items.length>1?10:0}}>
          <div><div style={{fontWeight:700,fontSize:15,color:G.text,marginBottom:5}}>{fecha}</div><Badge type={pasado?"green":"amber"}>{pasado?"Acreditado":"Pendiente"}</Badge></div>
          <div style={{textAlign:"right"}}><div style={{fontWeight:800,fontSize:20,color:pasado?G.green:G.text,letterSpacing:"-0.03em"}}>{fmt(total)}</div>{data.qr>0&&data.cred>0&&<div style={{fontSize:11,color:G.muted}}>QR {fmt(data.qr)} - Cred {fmt(data.cred)}</div>}</div>
        </div>
        {data.items.length>1&&data.items.map((it,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",borderTop:`1px solid ${G.borderLight}`,paddingTop:7,marginTop:6}}><span style={{fontSize:12,color:G.muted}}>Terminal {it.terminal} - Lote {it.lote} - {it.tipo==="qr"?"QR":"Credito"}</span><span style={{fontSize:12,fontWeight:600,color:G.text}}>{fmt(it.monto)}</span></div>))}
      </div>);
    })}
  </div>);}

// ── Tab Cuenta ─────────────────────────────────────────────
function TabCuenta({cierres,retiros,onRetirosChange,clientId}){
  const[newR,setNewR]=useState({fecha:hoy(),monto:"",descripcion:""});
  const[err,setErr]=useState("");const[saving,setSaving]=useState(false);
  const acredMap={};
  cierres.forEach(c=>{const add=(fecha,monto)=>{if(!fecha||!monto)return;acredMap[fecha]=(acredMap[fecha]||0)+Math.round(monto-monto*c.comisionPct);};if(c.qrDebito>0)add(c.fechaAcredQR,c.qrDebito);if(c.credito>0)add(c.fechaAcredCredito,c.credito);});
  const hoyMs=toMs(hoy());
  const acredHoy=Object.entries(acredMap).filter(([f])=>toMs(f)<=hoyMs).reduce((a,[,v])=>a+v,0);
  const porAcreditar=Object.entries(acredMap).filter(([f])=>toMs(f)>hoyMs).reduce((a,[,v])=>a+v,0);
  const totalRetiros=retiros.reduce((a,r)=>a+r.monto,0);
  const disponible=acredHoy-totalRetiros;
  const agregar=async()=>{
    const monto=parseFloat(newR.monto);
    if(!monto||monto<=0){setErr("Ingresa un monto valido");return;}
    if(!newR.fecha){setErr("Ingresa una fecha");return;}
    if(monto>disponible){setErr(`Supera el saldo disponible (${fmt(disponible)})`);return;}
    setSaving(true);
    try{
      const data={client_id:clientId,fecha:newR.fecha,monto,descripcion:newR.descripcion};
      const res=await db.createRetiro(data);
      onRetirosChange([...retiros,{...data,id:res[0].id}]);
      setNewR({fecha:hoy(),monto:"",descripcion:""});setErr("");
    }catch(e){setErr("Error guardando retiro");}
    setSaving(false);
  };
  const eliminar=async(id)=>{
    await db.deleteRetiro(id);
    onRetirosChange(retiros.filter(r=>r.id!==id));
  };
  return(<div>
    <div style={{...card,marginBottom:14}}>
      <div style={{fontSize:11,color:G.hint,textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:600,marginBottom:4}}>Saldo disponible ahora</div>
      <div style={{fontSize:34,fontWeight:800,color:disponible>=0?G.green:G.red,letterSpacing:"-0.04em",marginBottom:16}}>{fmt(disponible)}</div>
      {[{label:"Acreditado hasta hoy",value:fmt(acredHoy),color:G.green},{label:"Total retirado",value:fmt(totalRetiros),color:G.red},{label:"Por acreditar",value:fmt(porAcreditar),color:G.amber}].map(({label,value,color},i,arr)=>(<div key={label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:i<arr.length-1?`1px solid ${G.borderLight}`:"none"}}><span style={{fontSize:13,color:G.muted}}>{label}</span><span style={{fontSize:15,fontWeight:700,color}}>{value}</span></div>))}
    </div>
    <div style={{fontWeight:700,fontSize:15,color:G.text,marginBottom:10}}>Registrar retiro</div>
    <div style={{...card,marginBottom:14}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <div><label style={{display:"block",fontSize:12,fontWeight:600,color:G.muted,marginBottom:5}}>Fecha</label><input type="text" value={newR.fecha} placeholder="DD/MM/AAAA" onChange={e=>setNewR(p=>({...p,fecha:e.target.value}))} style={inputSt}/></div>
        <div><label style={{display:"block",fontSize:12,fontWeight:600,color:G.muted,marginBottom:5}}>Monto</label><input type="number" value={newR.monto} placeholder="0" onChange={e=>setNewR(p=>({...p,monto:e.target.value}))} style={{...inputSt,textAlign:"right"}}/></div>
      </div>
      <div style={{marginBottom:12}}><label style={{display:"block",fontSize:12,fontWeight:600,color:G.muted,marginBottom:5}}>Descripcion (opcional)</label><input type="text" value={newR.descripcion} placeholder="Ej: Retiro bancario..." onChange={e=>setNewR(p=>({...p,descripcion:e.target.value}))} style={inputSt}/></div>
      {err&&<div style={{background:G.redBg,border:`1px solid ${G.redBorder}`,borderRadius:8,padding:"8px 12px",color:G.redText,fontSize:13,marginBottom:10}}>{err}</div>}
      <button onClick={agregar} disabled={saving} style={{...btnPrimary,width:"100%",opacity:saving?0.7:1}}>{saving?"Guardando...":"+ Registrar retiro"}</button>
    </div>
    {retiros.length>0&&(<>
      <div style={{fontWeight:700,fontSize:15,color:G.text,marginBottom:10}}>Retiros registrados</div>
      {[...retiros].sort((a,b)=>toMs(b.fecha)-toMs(a.fecha)).map(r=>(<div key={r.id} style={{...card,marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:700,fontSize:15,color:G.red}}>{fmt(r.monto)}</div><div style={{fontSize:12,color:G.muted,marginTop:2}}>{r.fecha}{r.descripcion?` - ${r.descripcion}`:""}</div></div><button onClick={()=>eliminar(r.id)} style={{...btnDanger,padding:"7px 12px"}}>Eliminar</button></div>))}
    </>)}
  </div>);}

// ── Client View ────────────────────────────────────────────
function ClientView({clientName,comisionPct,clientId,onBack,onLogout,apiKey}){
  const[tab,setTab]=useState("cierres");
  const[loading,setLoading]=useState(false);
  const[loadingData,setLoadingData]=useState(true);
  const[error,setError]=useState(null);
  const[cierres,setCierres]=useState([]);
  const[retiros,setRetiros]=useState([]);

  useEffect(()=>{
    (async()=>{
      try{
        const [c,r]=await Promise.all([db.getCierres(clientId),db.getRetiros(clientId)]);
        setCierres((c||[]).map(mapCierreFromDB));
        setRetiros(r||[]);
      }catch(e){setError("Error cargando datos");}
      setLoadingData(false);
    })();
  },[clientId]);

  const processFiles=useCallback(async(files)=>{
    if(!apiKey){setError("Necesitas configurar tu API key de Anthropic primero. Sali, volvé a entrar y configura la key.");return;}
    setLoading(true);setError(null);
    let added=0;
    for(const file of files){
      if(!file.type.startsWith("image/"))continue;
      try{
        const b64=await fileToBase64(file);
        const ex=await extractFromImage(b64,file.type,apiKey);
        // Don't save if all zeros - means AI failed to read
        if(!ex.totalPesos&&!ex.qrDebito&&!ex.credito){
          setError("No se pudo leer el ticket. Verificá que la foto sea clara y volvé a intentar.");
          continue;
        }
        const calc=calcCierre({...ex,comisionPct});
        const dbRow=mapCierre(calc,clientId);
        const res=await db.createCierre(dbRow);
        setCierres(prev=>[calcCierre({...res[0],qr_debito:res[0].qr_debito,total_pesos:res[0].total_pesos,comision_pct:res[0].comision_pct,nroLote:res[0].nro_lote,nroComercio:res[0].nro_comercio}),...prev]);
        added++;
      }catch(e){setError(`Error: ${e.message}`);}
    }
    if(added>0)setError(null);
    setLoading(false);
  },[clientId,comisionPct,apiKey]);

  const deleteCierre=async(id)=>{
    await db.deleteCierre(id);
    setCierres(prev=>prev.filter(c=>c.id!==id));
  };

  const TABS=[{id:"cierres",label:`Cierres (${cierres.length})`},{id:"calendario",label:"Calendario"},{id:"cuenta",label:"Cuenta corriente"}];

  if(loadingData)return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:G.bg}}><div style={{textAlign:"center"}}><div style={{width:32,height:32,border:`3px solid ${G.blue}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin .8s linear infinite",margin:"0 auto 12px"}}/><div style={{color:G.muted,fontSize:14}}>Cargando datos...</div></div></div>);

  return(<div style={{minHeight:"100vh",background:G.bg}}>
    <div style={topbar}>
      {onBack&&<button onClick={onBack} style={{background:"none",border:"none",fontSize:22,color:G.muted,padding:0}}>←</button>}
      <div style={{fontWeight:700,fontSize:15,flex:1,color:G.text}}>{clientName}</div>
      <button onClick={()=>exportExcel(clientName,cierres,retiros,comisionPct)} style={{...btnOutline,fontSize:12,padding:"8px 14px"}}>↓ Excel</button>
      <button onClick={onLogout} style={{...btnGhost,fontSize:12,padding:"8px 12px"}}>Salir</button>
    </div>
    <div style={{maxWidth:720,margin:"0 auto",padding:"20px 16px"}}>
      <UploadZone onFiles={processFiles} loading={loading}/>
      {error&&<div style={{background:G.redBg,border:`1px solid ${G.redBorder}`,borderRadius:10,padding:"10px 14px",color:G.redText,fontSize:13,marginBottom:14}}>{error}</div>}
      {cierres.length===0&&!loading?(<div style={{textAlign:"center",padding:"40px 0",color:G.hint}}><div style={{fontSize:36,marginBottom:10}}>📋</div><div style={{fontSize:15,fontWeight:600,marginBottom:4}}>Sin cierres cargados</div><div style={{fontSize:13}}>Subi las fotos de los tickets para comenzar</div></div>):(<><TabBar tabs={TABS} active={tab} onChange={setTab}/>{tab==="cierres"&&<TabCierres cierres={cierres} onDelete={deleteCierre}/>}{tab==="calendario"&&<TabCalendario cierres={cierres}/>}{tab==="cuenta"&&<TabCuenta cierres={cierres} retiros={retiros} onRetirosChange={setRetiros} clientId={clientId}/>}</>)}
    </div>
  </div>);}

// ── Admin View ─────────────────────────────────────────────
function getMonthKey(fecha){if(!fecha)return"";const[d,m,y]=fecha.split("/");return y&&m?y+"-"+m:"";}
function getMonthLabel(key){if(!key)return"";const[y,m]=key.split("-");const months=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];return(months[parseInt(m)-1]||m)+" "+y;}

function exportAdminExcel(clients,allCierres,allRetiros,filterMonth){
  const wb=XLSX.utils.book_new();
  // Sheet 1: resumen por cliente
  const h1=["Cliente","Mes","Total Vendido","Comision Tarjetas","Retiros/Pagos","Com. Pagos 0.5%","Total a Cobrar","Ya Acreditado","Pendiente"];
  const rows=[];
  const hoyMs=toMs(hoy());
  const months=new Set();
  clients.forEach(c=>{(allCierres[c.client_id]||[]).forEach(r=>{if(r.fecha)months.add(getMonthKey(r.fecha));});});
  const monthList=filterMonth?[filterMonth]:[...months].sort().reverse();
  monthList.forEach(month=>{
    clients.forEach(c=>{
      const cierresMes=(allCierres[c.client_id]||[]).filter(r=>getMonthKey(r.fecha)===month);
      const retirosMes=(allRetiros[c.client_id]||[]).filter(r=>getMonthKey(r.fecha)===month);
      const proc=cierresMes.reduce((a,r)=>a+(r.totalPesos||0),0);
      if(proc===0)return;
      const com=cierresMes.reduce((a,r)=>a+(r.comisionMonto||0),0);
      const retiros=retirosMes.reduce((a,r)=>a+(r.monto||0),0);
      const comPagos=retiros*0.005;
      const acred=cierresMes.reduce((a,r)=>{
        const q=r.qrDebito>0&&r.fechaAcredQR&&toMs(r.fechaAcredQR)<=hoyMs?Math.round(r.qrDebito-r.qrDebito*r.comisionPct):0;
        const cr=r.credito>0&&r.fechaAcredCredito&&toMs(r.fechaAcredCredito)<=hoyMs?Math.round(r.credito-r.credito*r.comisionPct):0;
        return a+q+cr;
      },0);
      const pend=cierresMes.reduce((a,r)=>{
        const q=r.qrDebito>0&&r.fechaAcredQR&&toMs(r.fechaAcredQR)>hoyMs?Math.round(r.qrDebito-r.qrDebito*r.comisionPct):0;
        const cr=r.credito>0&&r.fechaAcredCredito&&toMs(r.fechaAcredCredito)>hoyMs?Math.round(r.credito-r.credito*r.comisionPct):0;
        return a+q+cr;
      },0);
      rows.push([c.nombre,getMonthLabel(month),proc,com,retiros,comPagos,com+comPagos,acred,pend]);
    });
  });
  const ws1=XLSX.utils.aoa_to_sheet([h1,...rows]);
  ws1["!cols"]=h1.map((_,i)=>({wch:i===0?20:i===1?14:18}));
  XLSX.utils.book_append_sheet(wb,ws1,"Resumen por cliente");
  // Sheet 2: detalle cierres
  const h2=["Cliente","Terminal","Fecha","Hora","Lote","QR/Debito","Credito","Total","Comision%","Comision$","Saldo","AcredQR","AcredCred"];
  const rows2=[];
  clients.forEach(c=>{
    const cierresFilt=filterMonth?(allCierres[c.client_id]||[]).filter(r=>getMonthKey(r.fecha)===filterMonth):(allCierres[c.client_id]||[]);
    cierresFilt.forEach(r=>{rows2.push([c.nombre,r.terminal,r.fecha,r.hora||"",r.nroLote,r.qrDebito,r.credito,r.totalPesos,r.comisionPct,r.comisionMonto,r.saldoNeto,r.fechaAcredQR,r.fechaAcredCredito]);});
  });
  const ws2=XLSX.utils.aoa_to_sheet([h2,...rows2]);
  ws2["!cols"]=h2.map(()=>({wch:14}));
  XLSX.utils.book_append_sheet(wb,ws2,"Detalle cierres");
  const label=filterMonth?getMonthLabel(filterMonth):"todos";
  XLSX.writeFile(wb,`Admin_Posnet_${label.replace(/ /g,"_")}.xlsx`);
}

function AdminResumen({clients,allCierres,allRetiros,filterMonth,apiKey,onViewClient}){

        {[

          {l:"Ya acreditado",v:totalAcred,c:"#6ee7b7"},
          {l:"Pendiente",v:totalPend,c:"#fcd34d"},
        ].map(({l,v,c})=>(<div key={l} style={{background:"rgba(255,255,255,0.05)",borderRadius:8,padding:"8px 10px"}}>
          <div style={{fontSize:9,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:600,marginBottom:3}}>{l}</div>
          <div style={{fontWeight:700,color:c,fontSize:14}}>{fmt(v)}</div>
        </div>))}
      </div>
    </div>

    {/* Tabla por cliente */}
    <div style={{fontSize:11,color:G.hint,textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:600,marginBottom:10}}>Por cliente · {getMonthLabel(currentMonth)}</div>
    
    {/* Header tabla */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 100px 100px 100px 100px",gap:4,padding:"6px 10px",marginBottom:4}}>
      {["Cliente","Vendido","A cobrar","Acreditado","Pendiente"].map(h=>(
        <div key={h} style={{fontSize:9,color:G.hint,textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:600,textAlign:h==="Cliente"?"left":"right"}}>{h}</div>
      ))}
    </div>

    {clients.map(c=>{
      const cierresMes=(allCierres[c.client_id]||[]).filter(r=>getMonthKey(r.fecha)===currentMonth);
      const retirosMes=(allRetiros[c.client_id]||[]).filter(r=>getMonthKey(r.fecha)===currentMonth);
      const proc=cierresMes.reduce((a,r)=>a+(r.totalPesos||0),0);
      const com=cierresMes.reduce((a,r)=>a+(r.comisionMonto||0),0);
      const retiros=retirosMes.reduce((a,r)=>a+(r.monto||0),0);
      const comPagos=retiros*0.005;
      const totalCobrar=com+comPagos;
      const acred=cierresMes.reduce((a,r)=>{
        const q=r.qrDebito>0&&r.fechaAcredQR&&toMs(r.fechaAcredQR)<=hoyMs?Math.round(r.qrDebito-r.qrDebito*r.comisionPct):0;
        const cr=r.credito>0&&r.fechaAcredCredito&&toMs(r.fechaAcredCredito)<=hoyMs?Math.round(r.credito-r.credito*r.comisionPct):0;
        return a+q+cr;
      },0);
      const pend=cierresMes.reduce((a,r)=>{
        const q=r.qrDebito>0&&r.fechaAcredQR&&toMs(r.fechaAcredQR)>hoyMs?Math.round(r.qrDebito-r.qrDebito*r.comisionPct):0;
        const cr=r.credito>0&&r.fechaAcredCredito&&toMs(r.fechaAcredCredito)>hoyMs?Math.round(r.credito-r.credito*r.comisionPct):0;
        return a+q+cr;
      },0);
      const cantPagos=retirosMes.length;
      return(<div key={c.client_id} style={{...card,marginBottom:8,padding:"10px 12px",cursor:"pointer"}} onClick={()=>onViewClient(c)}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 100px 100px 100px 100px",gap:4,alignItems:"center",marginBottom:cantPagos>0?8:0}}>
          <div>
            <div style={{fontWeight:700,fontSize:13,color:G.text}}>{c.nombre}</div>
            <div style={{fontSize:10,color:G.muted}}>{cierresMes.length} cierre{cierresMes.length!==1?"s":""} · Com. {(c.comision*100).toFixed(1)}%</div>
          </div>
          <div style={{textAlign:"right",fontWeight:600,fontSize:13,color:G.blue}}>{fmt(proc)}</div>
          <div style={{textAlign:"right",fontWeight:700,fontSize:13,color:G.green}}>{fmt(totalCobrar)}</div>
          <div style={{textAlign:"right",fontWeight:600,fontSize:13,color:G.green}}>{fmt(acred)}</div>
          <div style={{textAlign:"right",fontWeight:600,fontSize:13,color:pend>0?G.amber:G.muted}}>{fmt(pend)}</div>
        </div>
        {cantPagos>0&&(
          <div style={{borderTop:"1px solid "+G.borderLight,paddingTop:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:11,color:G.muted}}>{cantPagos} pago{cantPagos!==1?"s":""} · Com. 0.5%</span>
            <span style={{fontSize:11,fontWeight:600,color:G.green}}>{fmt(comPagos)}</span>
          </div>
        )}
      </div>);
    })}

    {/* Total fila */}
    <div style={{...card,padding:"10px 12px",background:G.bg,borderStyle:"dashed"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 100px 100px 100px 100px",gap:4,alignItems:"center"}}>
        <div style={{fontWeight:700,fontSize:13,color:G.text}}>TOTAL</div>
        <div style={{textAlign:"right",fontWeight:800,fontSize:13,color:G.blue}}>{fmt(totalProcMes)}</div>
        <div style={{textAlign:"right",fontWeight:800,fontSize:13,color:G.green}}>{fmt(totalAcobrar)}</div>
        <div style={{textAlign:"right",fontWeight:800,fontSize:13,color:G.green}}>{fmt(totalAcred)}</div>
        <div style={{textAlign:"right",fontWeight:800,fontSize:13,color:G.amber}}>{fmt(totalPend)}</div>
      </div>
    </div>
  </div>);}

function AdminView({onLogout,apiKey}){
  const[screen,setScreen]=useState("dash");
  const[selClient,setSelClient]=useState(null);
  const[clients,setClients]=useState([]);
  const[loading,setLoading]=useState(true);
  const[allCierres,setAllCierres]=useState({});
  const[allRetiros,setAllRetiros]=useState({});
  const[activeTab,setActiveTab]=useState("resumen");
  const[filterMonth,setFilterMonth]=useState("");
  const[nc,setNc]=useState({nombre:"",usuario:"",password:"",comision:"9.5"});
  const[ncErr,setNcErr]=useState("");
  const[saving,setSaving]=useState(false);

  const loadData=async()=>{
    try{
      const c=await db.getClients();setClients(c||[]);
      const cm={};const rm={};
      await Promise.all((c||[]).map(async cl=>{
        const[cierres,retiros]=await Promise.all([db.getCierres(cl.client_id),db.getRetiros(cl.client_id)]);
        cm[cl.client_id]=(cierres||[]).map(mapCierreFromDB);
        rm[cl.client_id]=retiros||[];
      }));
      setAllCierres(cm);setAllRetiros(rm);
    }catch(e){}
    setLoading(false);
  };

  useEffect(()=>{loadData();},[]);

  // Build list of available months
  const allMonths=new Set();
  clients.forEach(c=>{(allCierres[c.client_id]||[]).forEach(r=>{if(r.fecha)allMonths.add(getMonthKey(r.fecha));});});
  const monthList=[...allMonths].sort().reverse();
  const now=new Date();
  const currentMonth=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  const activeMonth=filterMonth||currentMonth;

  const addClient=async()=>{
    if(!nc.nombre||!nc.usuario||!nc.password){setNcErr("Completa todos los campos");return;}
    setSaving(true);
    try{
      const clientId="cl_"+Date.now();
      const data={username:nc.usuario.toLowerCase(),password:nc.password,role:"client",nombre:nc.nombre,comision:parseFloat(nc.comision)/100||0.095,client_id:clientId};
      await db.createUser(data);
      setClients(prev=>[...prev,data]);
      setAllCierres(prev=>({...prev,[clientId]:[]}));
      setAllRetiros(prev=>({...prev,[clientId]:[]}));
      setNc({nombre:"",usuario:"",password:"",comision:"9.5"});setNcErr("");setScreen("dash");
    }catch(e){setNcErr("Error: ese usuario ya existe");}
    setSaving(false);
  };

  const deleteClient=async(username)=>{
    if(!window.confirm("Eliminar este cliente?"))return;
    await db.deleteUser(username);
    setClients(prev=>prev.filter(c=>c.username!==username));
  };

  // When admin views a client, pass admin's apiKey for demo purposes
  if(screen==="detail"&&selClient){
    return <ClientView clientName={selClient.nombre} comisionPct={selClient.comision} clientId={selClient.client_id}
      onBack={()=>{setScreen("dash");loadData();}} onLogout={onLogout} apiKey={apiKey}/>;
  }

  if(screen==="newclient")return(<div style={{minHeight:"100vh",background:G.bg}}>
    <div style={topbar}><button onClick={()=>setScreen("dash")} style={{background:"none",border:"none",fontSize:22,color:G.muted,padding:0}}>←</button><div style={{fontWeight:700,fontSize:15,color:G.text}}>Nuevo cliente</div></div>
    <div style={{maxWidth:460,margin:"28px auto",padding:"0 16px"}}><div style={card}>
      {[{label:"Nombre del cliente",key:"nombre",type:"text",ph:"Ej: Lardo"},{label:"Usuario (login)",key:"usuario",type:"text",ph:"Ej: lardo"},{label:"Contrasena",key:"password",type:"password",ph:""},{label:"Comision (%)",key:"comision",type:"number",ph:"9.5"}].map(({label,key,type,ph})=>(<div key={key} style={{marginBottom:14}}><label style={{display:"block",fontSize:13,fontWeight:600,color:G.muted,marginBottom:6}}>{label}</label><input type={type} value={nc[key]} placeholder={ph} onChange={e=>setNc(p=>({...p,[key]:e.target.value}))} style={inputSt}/></div>))}
      {ncErr&&<div style={{background:G.redBg,border:"1px solid "+G.redBorder,borderRadius:8,padding:"9px 12px",color:G.redText,fontSize:13,marginBottom:12}}>{ncErr}</div>}
      <div style={{display:"flex",gap:10}}><button onClick={()=>setScreen("dash")} style={{...btnGhost,flex:1}}>Cancelar</button><button onClick={addClient} disabled={saving} style={{...btnPrimary,flex:1,opacity:saving?0.7:1}}>{saving?"Guardando...":"Crear cliente"}</button></div>
    </div></div>
  </div>);

  if(loading)return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:G.bg}}><div style={{width:32,height:32,border:"3px solid "+G.blue,borderTopColor:"transparent",borderRadius:"50%",animation:"spin .8s linear infinite"}}/></div>);

  const TABS=[{id:"resumen",label:"Resumen"},{id:"clientes",label:"Clientes"}];

  return(<div style={{minHeight:"100vh",background:G.bg}}>
    <div style={topbar}>
      <div style={{fontWeight:700,fontSize:16,flex:1,color:G.text}}>Panel Admin</div>
      <button onClick={()=>exportAdminExcel(clients,allCierres,allRetiros,activeMonth!==currentMonth?activeMonth:"")} style={{...btnOutline,fontSize:11,padding:"7px 12px"}}>↓ Excel</button>
      <button onClick={onLogout} style={{...btnGhost,fontSize:12,padding:"8px 12px"}}>Salir</button>
    </div>
    <div style={{maxWidth:720,margin:"0 auto",padding:"20px 16px"}}>
      <TabBar tabs={TABS} active={activeTab} onChange={setActiveTab}/>

      {activeTab==="resumen"&&(<div>
        {/* Filtro por mes */}
        <div style={{display:"flex",gap:8,marginBottom:16,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{fontSize:12,color:G.muted,fontWeight:500}}>Mes:</div>
          {[currentMonth,...monthList.filter(m=>m!==currentMonth)].slice(0,6).map(m=>(
            <button key={m} onClick={()=>setFilterMonth(m===activeMonth?"":m)}
              style={{padding:"6px 14px",borderRadius:20,border:"none",fontSize:12,fontWeight:600,
                background:activeMonth===m?G.blue:G.white,color:activeMonth===m?"#fff":G.muted,
                boxShadow:activeMonth===m?"none":"inset 0 0 0 1px "+G.border}}>
              {getMonthLabel(m)}
            </button>
          ))}
        </div>
        <AdminResumen clients={clients} allCierres={allCierres} allRetiros={allRetiros} filterMonth={activeMonth} apiKey={apiKey} onViewClient={c=>{setSelClient(c);setScreen("detail");}}/>
      </div>)}

      {activeTab==="clientes"&&(<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <h2 style={{fontSize:16,fontWeight:700,color:G.text,margin:0}}>Clientes ({clients.length})</h2>
          <button onClick={()=>setScreen("newclient")} style={{...btnPrimary,fontSize:13,padding:"9px 18px"}}>+ Nuevo</button>
        </div>
        {clients.length===0&&<div style={{textAlign:"center",padding:"48px 0",color:G.hint}}><div style={{fontSize:36,marginBottom:10}}>👥</div><div style={{fontSize:15,fontWeight:600}}>Sin clientes aun</div></div>}
        {clients.map(c=>{
          const cierres=allCierres[c.client_id]||[];
          const retiros=allRetiros[c.client_id]||[];
          const totalProc=cierres.reduce((a,r)=>a+(r.totalPesos||0),0);
          const totalCom=cierres.reduce((a,r)=>a+(r.comisionMonto||0),0);
          const totalRet=retiros.reduce((a,r)=>a+(r.monto||0),0);
          const comPagos=totalRet*0.005;
          return(<div key={c.username} className="anim" style={{...card,marginBottom:10,borderLeft:"3px solid "+G.blue,borderRadius:"0 14px 14px 0"}}>
            <div style={{marginBottom:10}}>
              <div style={{fontWeight:700,fontSize:15,color:G.text,marginBottom:2}}>{c.nombre}</div>
              <div style={{fontSize:12,color:G.muted}}>@{c.username} · Com. {(c.comision*100).toFixed(2)}% · {cierres.length} cierres acumulados</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              <Stat label="Total procesado" value={fmt(totalProc)} color={G.blue}/>
              <Stat label="Com. tarjetas" value={fmt(totalCom)} color={G.green}/>
              <Stat label="Pagos realizados" value={fmt(totalRet)} color={G.text}/>
              <Stat label="Com. pagos 0.5%" value={fmt(comPagos)} color={G.green}/>
            </div>
            <div style={{background:G.greenBg,border:"1px solid "+G.greenBorder,borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={{fontSize:12,fontWeight:600,color:G.greenText}}>Total a cobrar (acumulado)</span>
              <span style={{fontWeight:800,color:G.greenText,fontSize:15}}>{fmt(totalCom+comPagos)}</span>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{setSelClient(c);setScreen("detail");}} style={{...btnPrimary,flex:1,fontSize:13,padding:"10px"}}>Ver cierres</button>
              <button onClick={()=>deleteClient(c.username)} style={{...btnDanger,padding:"10px 12px"}}>Eliminar</button>
            </div>
          </div>);
        })}
      </div>)}
    </div>
  </div>);}
