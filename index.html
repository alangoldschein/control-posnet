async function supaFetch(path,options={}){
  const res=await fetch(`${SUPA_URL}/rest/v1${path}`,{...options,headers:{"Content-Type":"application/json","apikey":SUPA_KEY,"Authorization":`Bearer ${SUPA_KEY}`,"Prefer":options.prefer||"",...options.headers}});
  if(!res.ok){const err=await res.text();throw new Error(err);}
  const text=await res.text();
  return text?JSON.parse(text):null;
}

  createUser:(d)=>supaFetch(`/users`,{method:"POST",prefer:"return=representation",body:JSON.stringify(d)}),
  deleteUser:(u)=>supaFetch(`/users?username=eq.${encodeURIComponent(u)}`,{method:"DELETE"}),

function addDays(s,d){if(!s)return"";const[dd,mm,yy]=s.split("/");if(!dd||!mm||!yy)return"";const dt=new Date(`${yy}-${mm}-${dd}`);if(isNaN(dt))return"";dt.setDate(dt.getDate()+d);return dt.toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"});}
function toMs(s){if(!s)return 0;const parts=s.split("/");if(parts.length!==3)return 0;return new Date(`${parts[2]}-${parts[1]}-${parts[0]}`).getTime();}
function hoy(){return new Date().toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"});}
const fmt=n=>new Intl.NumberFormat("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0}).format(n||0);
function sGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function sSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

function sortCierres(arr){return[...arr].sort((a,b)=>{const dd=toMs(b.fecha)-toMs(a.fecha);if(dd!==0)return dd;const ts=h=>{if(!h)return 0;const[hh,mm,ss]=h.split(":");return+hh*3600+ +mm*60+ +(ss||0);};return ts(b.hora)-ts(a.hora);});}

function calcCierre(raw){
  const qr=parseFloat(raw.qr_debito||raw.qrDebito)||0;
  const cred=parseFloat(raw.credito)||0;
  const total=parseFloat(raw.total_pesos||raw.totalPesos)||(qr+cred);
  const pct=parseFloat(raw.comision_pct||raw.comisionPct)||0.095;
  const com=Math.round(total*pct);
  return{...raw,qrDebito:qr,credito:cred,totalPesos:total,comisionPct:pct,comisionMonto:com,saldoNeto:total-com,
    fechaAcredQR:qr>0?addDays(raw.fecha,3):"",fechaAcredCredito:cred>0?addDays(raw.fecha,18):""};
}

function mapCierreFromDB(r){return calcCierre({id:r.id,terminal:r.terminal,fecha:r.fecha,hora:r.hora,nroLote:r.nro_lote,nroComercio:r.nro_comercio,qr_debito:r.qr_debito,credito:r.credito,total_pesos:r.total_pesos,comision_pct:r.comision_pct});}
function mapCierre(r,id){return{client_id:id,terminal:r.terminal||"",fecha:r.fecha||"",hora:r.hora||"",nro_lote:r.nroLote||"",nro_comercio:r.nroComercio||"",qr_debito:r.qrDebito||0,credito:r.credito||0,total_pesos:r.totalPesos||0,comision_pct:r.comisionPct||0.095,comision_monto:r.comisionMonto||0,saldo_neto:r.saldoNeto||0,fecha_acred_qr:r.fechaAcredQR||"",fecha_acred_credito:r.fechaAcredCredito||""};}

async function extractFromImage(base64,mediaType,apiKey){
  const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:600,messages:[{role:"user",content:[
      {type:"image",source:{type:"base64",media_type:mediaType,data:base64}},
      {type:"text",text:`Lee este ticket de cierre de lote de posnet argentino. Responde SOLO con JSON valido sin texto extra:\n{"terminal":"numero","fecha":"DD/MM/YYYY","hora":"HH:MM:SS","nroLote":"numero","nroComercio":"numero","qrDebito":numero,"credito":numero,"totalPesos":numero}\n- qrDebito: suma VISA DEBITO + MASTERCARD PREPAGO + QR + TRANSFERENCIA INMEDIATA\n- credito: MASTERCARD credito + VISA credito + AMEX\n- totalPesos: TOTALES EN PESOS\n- Numeros sin $ ni puntos. Ausentes = 0 o "".`}
    ]}]})});
  const data=await resp.json();
  if(data.error)throw new Error(data.error.message||"Error API");
  const text=data.content?.find(b=>b.type==="text")?.text||"{}";
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

function fileToBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej(new Error("Error"));r.readAsDataURL(file);});}

    if(!k.startsWith("sk-ant-")){setErr("La key debe empezar con sk-ant-");return;}
    setLoading(true);setErr("");
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"x-api-key":k,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true","Content-Type":"application/json"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:5,messages:[{role:"user",content:"hi"}]})});
      const d=await r.json();
      if(d.error&&d.error.type==="authentication_error"){setErr("API key inválida.");setLoading(false);return;}
      onSave(k);
    }catch(e){setErr("No se pudo verificar. Intentá de nuevo.");setLoading(false);}
  };
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:G.bg,padding:20}}>
      <div style={{background:G.card,borderRadius:16,padding:32,maxWidth:440,width:"100%",boxShadow:"0 4px 24px rgba(0,0,0,0.08)"}}>
        <div style={{fontSize:32,marginBottom:8}}>🔑</div>
        <h2 style={{fontSize:20,fontWeight:700,marginBottom:8}}>Configurar API Key</h2>
        <p style={{color:G.muted,fontSize:14,marginBottom:8}}>Solo la necesitás configurar una vez.</p>
        <p style={{color:G.muted,fontSize:13,marginBottom:16}}>Obtené tu key en <a href="https://console.anthropic.com" target="_blank" style={{color:G.blue}}>console.anthropic.com</a> → API Keys → Create Key</p>
        <input value={k} onChange={e=>setK(e.target.value)} placeholder="sk-ant-api03-..." style={{width:"100%",padding:"10px 12px",border:`1px solid ${G.border}`,borderRadius:8,fontSize:14,marginBottom:12}}/>
        {err&&<p style={{color:G.red,fontSize:13,marginBottom:12}}>{err}</p>}
        <button onClick={handle} disabled={loading||!k} style={{width:"100%",padding:11,background:G.blue,color:"#fff",border:"none",borderRadius:8,fontWeight:600,fontSize:15,opacity:loading||!k?0.6:1}}>

function Login({onLogin}){

function exportCuentaExcel(rows, clientName){
  const wb=XLSX.utils.book_new();
  const data=[["Fecha Acred.","Tipo","Importe","Comision","Saldo Neto","Saldo Acumulado","Lote","Fecha Cierre","Terminal"]];
  rows.forEach(r=>data.push([r.fecha,r.label,r.importe>0?r.importe:-r.importe,r.com>0?-r.com:"",r.saldoNeto,r.acum,r.nroLote||"",r.fechaCierre||"",r.terminal||""]));
  const ws=XLSX.utils.aoa_to_sheet(data);
  XLSX.utils.book_append_sheet(wb,ws,"Cuenta Corriente");
  XLSX.writeFile(wb,`${clientName}_cuenta_corriente.xlsx`);
}

function CuentaCorriente({cierres,retiros,clientId,load,clientName}){
  const[showRetiro,setShowRetiro]=useState(false);
  const[retiroMonto,setRetiroMonto]=useState("");
  const[retiroDesc,setRetiroDesc]=useState("");
  const[retiroFecha,setRetiroFecha]=useState("");
  const[expanded,setExpanded]=useState(null);
  const[periodoFiltro,setPeriodoFiltro]=useState("todo");
  const hoyMs=new Date().getTime();

  // Build all rows by fecha de acreditacion
  const allRows=[];
  sortCierres(cierres).forEach(c=>{
    if(c.qrDebito>0&&c.fechaAcredQR){
      const com=Math.round(c.qrDebito*c.comisionPct);
      allRows.push({id:`qr-${c.id}`,fecha:c.fechaAcredQR,ms:toMs(c.fechaAcredQR),tipo:"qr",label:"QR / Débito",
        importe:c.qrDebito,com,saldoNeto:c.qrDebito-com,
        nroLote:c.nroLote,fechaCierre:c.fecha,terminal:c.terminal});
    }
    if(c.credito>0&&c.fechaAcredCredito){
      const com=Math.round(c.credito*c.comisionPct);
      allRows.push({id:`cred-${c.id}`,fecha:c.fechaAcredCredito,ms:toMs(c.fechaAcredCredito),tipo:"credito",label:"Crédito",
        importe:c.credito,com,saldoNeto:c.credito-com,
        nroLote:c.nroLote,fechaCierre:c.fecha,terminal:c.terminal});
    }
  });
  retiros.forEach(r=>{
    allRows.push({id:`ret-${r.id}`,fecha:r.fecha,ms:toMs(r.fecha),tipo:"retiro",label:r.descripcion||"Retiro/Pago",
      importe:-r.monto,com:0,saldoNeto:-r.monto,retiroId:r.id});
  });
  allRows.sort((a,b)=>a.ms-b.ms);

  // Get unique months for filter
  const meses=["Todo"];
  allRows.forEach(r=>{
    const[d,m,y]=r.fecha.split("/");
    const mes=new Date(`${y}-${m}-${d}`).toLocaleDateString("es-AR",{month:"long",year:"numeric"});
    if(!meses.includes(mes))meses.push(mes);
  });

  // Filter rows by period
  const filteredRows=periodoFiltro==="todo"?allRows:allRows.filter(r=>{
    const[d,m,y]=r.fecha.split("/");
    return new Date(`${y}-${m}-${d}`).toLocaleDateString("es-AR",{month:"long",year:"numeric"})===periodoFiltro;
  });

  // Calculate acum on filtered rows
  let acum=0;
  const rows=filteredRows.map(r=>{acum+=r.saldoNeto;return{...r,acum};});

  // Cuadro numbers
  const totalBruto=rows.filter(r=>r.tipo!=="retiro").reduce((a,r)=>a+r.importe,0);
  const totalCom=rows.filter(r=>r.tipo!=="retiro").reduce((a,r)=>a+r.com,0);
  const totalNeto=totalBruto-totalCom;
  const totalRetiros=Math.abs(rows.filter(r=>r.tipo==="retiro").reduce((a,r)=>a+r.importe,0));
  const saldoFinal=totalNeto-totalRetiros;
  const saldoTabla=rows.length>0?rows[rows.length-1].acum:0;
  const cuadra=Math.abs(saldoFinal-saldoTabla)<1;

  const cfg={
    qr:{label:"QR / Débito",color:"#1d4ed8",bg:"#dbeafe",icon:"💳"},
    credito:{label:"Crédito",color:"#6d28d9",bg:"#ede9fe",icon:"🟣"},
    retiro:{label:"Retiro/Pago",color:"#be123c",bg:"#fee2e2",icon:"💸"},
  };

  return(
    <div>
      {/* Filtro de periodo - select */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
        <span style={{fontSize:12,color:G.muted,fontWeight:600}}>Período:</span>
        <select value={periodoFiltro} onChange={e=>setPeriodoFiltro(e.target.value)}
          style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${G.blue}`,background:G.blue,color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",outline:"none"}}>
          <option value="todo" style={{background:"#fff",color:G.text}}>Todo el período</option>
          {meses.filter(m=>m!=="Todo").map(m=>(
            <option key={m} value={m} style={{background:"#fff",color:G.text}}>{m.charAt(0).toUpperCase()+m.slice(1)}</option>
          ))}
        </select>
      </div>

      {/* CUADRO */}
      <div style={{background:G.dark,borderRadius:16,padding:20,marginBottom:20,color:"#fff"}}>
        <div style={{fontSize:11,color:"#94a3b8",textTransform:"uppercase",letterSpacing:".05em",marginBottom:16}}>
          CUADRO · {periodoFiltro==="todo"?"Todo el período":periodoFiltro.toUpperCase()}
        </div>

        {[
          ["Total acreditado (bruto)","QR/Débito + Crédito",fmt(totalBruto),"#60a5fa",false],
          ["Comisión financiera","Cobrada por la financiera","-"+fmt(totalCom),"#f87171",false],
        ].map(([title,sub,val,color])=>(
          <div key={title} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:"#e2e8f0"}}>{title}</div>
              <div style={{fontSize:11,color:"#64748b",marginTop:1}}>{sub}</div>
            </div>
            <div style={{fontSize:16,fontWeight:700,color}}>{val}</div>
          </div>
        ))}

        <div style={{background:"#1e293b",borderRadius:10,padding:"10px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>Neto acreditado</div>
          <div style={{fontSize:16,fontWeight:800,color:"#34d399"}}>{fmt(totalNeto)}</div>
        </div>

        <div style={{borderTop:"1px solid #1e293b",margin:"10px 0"}}/>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:"#e2e8f0"}}>Retiros / Pagos</div>
            <div style={{fontSize:11,color:"#64748b",marginTop:1}}>{rows.filter(r=>r.tipo==="retiro").length} movimiento(s)</div>
          </div>
          <div style={{fontSize:16,fontWeight:700,color:"#f87171"}}>{totalRetiros>0?"-"+fmt(totalRetiros):fmt(0)}</div>
        </div>

        <div style={{borderTop:"2px solid #334155",margin:"12px 0"}}/>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:"#fff"}}>Saldo neto acumulado</div>
            <div style={{fontSize:11,color:"#64748b",marginTop:1}}>= última fila de la tabla</div>
          </div>
          <div style={{fontSize:22,fontWeight:900,color:"#34d399"}}>{fmt(saldoFinal)}</div>
        </div>

        <div style={{marginTop:14,background:cuadra?"#064e3b":"#7f1d1d",borderRadius:8,padding:"8px 12px",display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:14}}>{cuadra?"✅":"⚠️"}</span>
          <span style={{fontSize:12,color:cuadra?"#6ee7b7":"#fca5a5",fontWeight:600}}>
            {cuadra?"Cuadro OK — el saldo coincide con el detalle de la tabla":"Diferencia detectada — revisá los datos"}
          </span>
        </div>
      </div>

      {/* Botón Excel */}
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
        <button onClick={()=>exportCuentaExcel(rows,clientName||"cliente")}
          style={{fontSize:13,background:G.greenBg,color:G.green,border:"1px solid #bbf7d0",borderRadius:8,padding:"7px 14px",fontWeight:600,cursor:"pointer"}}>
          ↓ Excel
        </button>
      </div>

      {/* Tabla */}
      {rows.length===0?(
        <div style={{textAlign:"center",padding:"40px 0",color:G.muted}}>
          <div style={{fontSize:36,marginBottom:8}}>📅</div>
          <div style={{fontWeight:600}}>Sin movimientos en este período</div>
        </div>
      ):(
        <div style={{background:G.card,border:`1px solid ${G.border}`,borderRadius:14,overflow:"hidden",marginBottom:16}}>
          {/* Header */}
          <div style={{display:"grid",gridTemplateColumns:"82px 96px 1fr 92px 80px 1fr 18px",padding:"10px 14px",background:G.bg,fontSize:10,color:G.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:".04em",gap:6,alignItems:"center"}}>
            {["Fecha acred.","Tipo","Detalle","Importe","Comisión","Saldo acum.",""].map(h=><div key={h} style={{textAlign:h==="Importe"||h==="Comisión"||h==="Saldo acum."?"right":"left"}}>{h}</div>)}
          </div>

          {rows.map((r,i)=>{
            const c=cfg[r.tipo]||cfg.qr;
            const isPast=r.ms<=hoyMs;
            const isExp=expanded===r.id;
            const nextDiff=i<rows.length-1&&rows[i+1].fecha!==r.fecha;
            return(
              <div key={r.id}>
                <div style={{borderTop:`1px solid ${G.border}`}}>
                  <div onClick={()=>setExpanded(isExp?null:r.id)}
                    style={{display:"grid",gridTemplateColumns:"82px 96px 1fr 92px 80px 1fr 18px",padding:"11px 14px",gap:6,alignItems:"center",cursor:"pointer",background:isExp?"#f8fafc":"#fff",opacity:isPast?1:0.65}}>
                    <div>
                      <div style={{fontSize:12,fontWeight:600,color:isPast?G.text:"#94a3b8"}}>{r.fecha}</div>
                      {!isPast&&<div style={{fontSize:9,color:"#f59e0b",fontWeight:600,marginTop:1}}>⏳ pendiente</div>}
                    </div>
                    <div><span style={{fontSize:10,fontWeight:700,padding:"3px 7px",borderRadius:6,background:c.bg,color:c.color,whiteSpace:"nowrap"}}>{c.icon} {c.label}</span></div>
                    <div style={{fontSize:11,color:G.muted,lineHeight:1.4}}>
                      {r.nroLote&&<span>Lote {r.nroLote} · {r.fechaCierre}</span>}
                      {r.label==="Retiro/Pago"&&<span>{r.label}</span>}
                      {r.terminal&&<span style={{display:"block",color:"#94a3b8"}}>Terminal {r.terminal}</span>}
                    </div>
                    <div style={{textAlign:"right",fontSize:13,fontWeight:700,color:r.importe>0?G.text:G.red}}>{r.importe>0?fmt(r.importe):"-"+fmt(-r.importe)}</div>
                    <div style={{textAlign:"right",fontSize:12,color:r.com>0?G.red:G.muted}}>{r.com>0?"-"+fmt(r.com):"—"}</div>
                    <div style={{textAlign:"right",fontSize:13,fontWeight:800,color:r.acum>=0?G.green:G.red}}>{fmt(r.acum)}</div>
                    <div style={{textAlign:"right",fontSize:11,color:G.muted}}>{isExp?"▲":"▼"}</div>
                  </div>
                  {isExp&&(
                    <div style={{background:"#f8fafc",borderTop:`1px solid ${G.border}`,padding:"12px 14px 14px 20px"}}>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                        {r.nroLote&&<div><div style={{fontSize:10,color:G.muted,textTransform:"uppercase",marginBottom:2}}>Nro. Lote</div><div style={{fontSize:13,fontWeight:600}}>{r.nroLote}</div></div>}
                        {r.fechaCierre&&<div><div style={{fontSize:10,color:G.muted,textTransform:"uppercase",marginBottom:2}}>Fecha cierre</div><div style={{fontSize:13,fontWeight:600}}>{r.fechaCierre}</div></div>}
                        {r.terminal&&<div><div style={{fontSize:10,color:G.muted,textTransform:"uppercase",marginBottom:2}}>Terminal</div><div style={{fontSize:13,fontWeight:600}}>{r.terminal}</div></div>}
                        <div><div style={{fontSize:10,color:G.muted,textTransform:"uppercase",marginBottom:2}}>Importe bruto</div><div style={{fontSize:13,fontWeight:600}}>{fmt(r.importe>0?r.importe:-r.importe)}</div></div>
                        {r.com>0&&<div><div style={{fontSize:10,color:G.muted,textTransform:"uppercase",marginBottom:2}}>Comisión</div><div style={{fontSize:13,fontWeight:600,color:G.red}}>-{fmt(r.com)}</div></div>}
                        <div><div style={{fontSize:10,color:G.muted,textTransform:"uppercase",marginBottom:2}}>Neto</div><div style={{fontSize:14,fontWeight:800,color:r.saldoNeto>=0?G.green:G.red}}>{fmt(r.saldoNeto)}</div></div>
                      </div>
                    </div>
                  )}
                </div>
                {nextDiff&&<div style={{height:4,background:G.bg}}/>}
              </div>
            );
          })}
        </div>
      )}

      {/* Retiros */}
      <div style={{marginTop:16,borderTop:`1px solid ${G.border}`,paddingTop:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontWeight:600,fontSize:14}}>Retiros / Pagos</span>
          <button onClick={()=>setShowRetiro(!showRetiro)} style={{fontSize:13,background:G.blueBg,color:G.blue,border:`1px solid ${G.blueBorder}`,borderRadius:8,padding:"4px 10px",cursor:"pointer"}}>+ Agregar</button>
        </div>
        {showRetiro&&(
          <div style={{background:G.card,border:`1px solid ${G.border}`,borderRadius:10,padding:12,marginBottom:10}}>
            <input type="number" placeholder="Monto" value={retiroMonto} onChange={e=>setRetiroMonto(e.target.value)} style={{width:"100%",padding:"8px 10px",border:`1px solid ${G.border}`,borderRadius:6,fontSize:14,marginBottom:8}}/>
            <input placeholder="Descripción (opcional)" value={retiroDesc} onChange={e=>setRetiroDesc(e.target.value)} style={{width:"100%",padding:"8px 10px",border:`1px solid ${G.border}`,borderRadius:6,fontSize:14,marginBottom:8}}/>
            <div style={{marginBottom:8}}>
              <label style={{fontSize:11,color:G.muted,display:"block",marginBottom:3}}>Fecha del retiro</label>
              <input type="date" value={retiroFecha} onChange={e=>setRetiroFecha(e.target.value)} style={{width:"100%",padding:"8px 10px",border:`1px solid ${G.border}`,borderRadius:6,fontSize:14}}/>
            </div>
            <button onClick={async()=>{
              if(!retiroMonto)return;
              const fechaFinal=retiroFecha?retiroFecha.split("-").reverse().join("/"):hoy();
              await db.createRetiro({client_id:clientId,fecha:fechaFinal,monto:parseFloat(retiroMonto),descripcion:retiroDesc});
              setRetiroMonto("");setRetiroDesc("");setRetiroFecha("");setShowRetiro(false);load();
            }} style={{background:G.blue,color:"#fff",border:"none",borderRadius:6,padding:"7px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>Guardar</button>
          </div>
        )}
        {retiros.map(r=>(
          <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${G.border}`}}>
            <div><div style={{fontSize:14,fontWeight:600}}>{fmt(r.monto)}</div><div style={{fontSize:12,color:G.muted}}>{r.fecha} · {r.descripcion||""}</div></div>
            <button onClick={async()=>{await db.deleteRetiro(r.id);load();}} style={{fontSize:12,color:G.red,background:"none",border:"none",cursor:"pointer"}}>✕</button>
          </div>
        ))}
      </div>
    </div>
  );
}

function ClientView({clientName,comisionPct,clientId,onBack,onLogout,apiKey}){
  const[cierres,setCierres]=useState([]);
  const[retiros,setRetiros]=useState([]);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState(null);
  const[expanded,setExpanded]=useState(null);
  const[clientTab,setClientTab]=useState("cierres");
  const[periodoCliente,setPeriodoCliente]=useState("todo");
  const[showManual,setShowManual]=useState(false);
  const[mFecha,setMFecha]=useState("");
  const[mHora,setMHora]=useState("");
  const[mTerminal,setMTerminal]=useState("");
  const[mLote,setMLote]=useState("");
  const[mComercio,setMComercio]=useState("");
  const[mQR,setMQR]=useState("");
  const[mCred,setMCred]=useState("");
  const[mError,setMError]=useState("");
  const fileRef=useRef();

  const load=useCallback(async()=>{
    try{
      const[c,r]=await Promise.all([db.getCierres(clientId),db.getRetiros(clientId)]);
      setCierres(sortCierres((c||[]).map(mapCierreFromDB)));
      setRetiros(r||[]);
    }catch(e){setError("Error cargando datos");}
  },[clientId]);

  useEffect(()=>{load();},[load]);

  const processFiles=useCallback(async(files)=>{
    if(!apiKey){setError("No hay API key. Cerrá sesión y volvé a entrar.");return;}
    setLoading(true);setError(null);
    let added=0;
    for(const file of files){
      if(!file.type.startsWith("image/"))continue;
      try{
        const b64=await fileToBase64(file);
        const ex=await extractFromImage(b64,file.type,apiKey);
        if(!ex||(!ex.totalPesos&&!ex.qrDebito&&!ex.credito)){setError("No se pudo leer el ticket. Verificá que la foto sea clara.");continue;}
        // Check for duplicates
        const existing=cierres.find(c=>c.nroLote&&ex.nroLote&&c.nroLote===ex.nroLote&&c.terminal===ex.terminal&&c.fecha===ex.fecha);
        if(existing){setError(`⚠️ El ticket del lote ${ex.nroLote} (${ex.fecha}) ya fue cargado. Verificá que no sea duplicado.`);continue;}
        const cierre=calcCierre({...ex,fecha:ex.fecha||hoy(),comision_pct:comisionPct||0.095});
        await db.createCierre(mapCierre(cierre,clientId));
        added++;
      }catch(e){setError(`Error: ${e.message}`);}
    }
    setLoading(false);
    if(added>0)load();
  },[clientId,comisionPct,apiKey,load]);

  const totTotal=cierres.reduce((a,r)=>a+r.totalPesos,0);
  const totQR=cierres.reduce((a,r)=>a+r.qrDebito,0);
  const totCred=cierres.reduce((a,r)=>a+r.credito,0);
  const totCom=cierres.reduce((a,r)=>a+r.comisionMonto,0);

  return(
    <div style={{minHeight:"100vh",background:G.bg}}>
      <div style={{background:G.card,borderBottom:`1px solid ${G.border}`,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {onBack&&<button onClick={onBack} style={{background:"none",border:"none",fontSize:20,padding:4}}>←</button>}
          <span style={{fontWeight:700,fontSize:16}}>{clientName}</span>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onLogout} style={{background:G.bg,color:G.muted,border:`1px solid ${G.border}`,borderRadius:8,padding:"6px 12px",fontSize:13}}>Salir</button>
        </div>
      </div>
      <div style={{maxWidth:600,margin:"0 auto",padding:16}}>
        <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>processFiles(Array.from(e.target.files))}/>
        <div onClick={()=>fileRef.current.click()} style={{border:`2px dashed ${G.border}`,borderRadius:14,padding:"28px 20px",textAlign:"center",cursor:"pointer",marginBottom:8,background:G.card}}>
          <div style={{fontSize:32,marginBottom:8}}>📷</div>
          <div style={{fontWeight:600,marginBottom:4}}>Subir fotos de cierres</div>
          <div style={{color:G.muted,fontSize:13}}>Toca para seleccionar - Podés subir varios a la vez</div>
        </div>
        <div style={{textAlign:"center",marginBottom:12}}>
          <button onClick={()=>setShowManual(!showManual)} style={{fontSize:12,color:G.muted,background:"none",border:`1px solid ${G.border}`,borderRadius:8,padding:"5px 14px",cursor:"pointer"}}>
            ✏️ {showManual?"Cancelar carga manual":"Cargar manualmente"}
          </button>
        </div>
        {showManual&&(
          <div style={{background:G.card,border:`1px solid ${G.border}`,borderRadius:14,padding:16,marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>Carga manual de cierre</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <div>
                <label style={{fontSize:11,color:G.muted,display:"block",marginBottom:3}}>Fecha (DD/MM/YYYY)</label>
                <input value={mFecha} onChange={e=>setMFecha(e.target.value)} placeholder="23/04/2026" style={{width:"100%",padding:"8px 10px",border:`1px solid ${G.border}`,borderRadius:6,fontSize:13}}/>
              </div>
              <div>
                <label style={{fontSize:11,color:G.muted,display:"block",marginBottom:3}}>Hora (HH:MM:SS)</label>
                <input value={mHora} onChange={e=>setMHora(e.target.value)} placeholder="00:01:03" style={{width:"100%",padding:"8px 10px",border:`1px solid ${G.border}`,borderRadius:6,fontSize:13}}/>
              </div>
              <div>
                <label style={{fontSize:11,color:G.muted,display:"block",marginBottom:3}}>Terminal</label>
                <input value={mTerminal} onChange={e=>setMTerminal(e.target.value)} placeholder="16777521" style={{width:"100%",padding:"8px 10px",border:`1px solid ${G.border}`,borderRadius:6,fontSize:13}}/>
              </div>
              <div>
                <label style={{fontSize:11,color:G.muted,display:"block",marginBottom:3}}>Nro. Lote</label>
                <input value={mLote} onChange={e=>setMLote(e.target.value)} placeholder="012" style={{width:"100%",padding:"8px 10px",border:`1px solid ${G.border}`,borderRadius:6,fontSize:13}}/>
              </div>
              <div>
                <label style={{fontSize:11,color:G.muted,display:"block",marginBottom:3}}>Nro. Comercio</label>
                <input value={mComercio} onChange={e=>setMComercio(e.target.value)} placeholder="00491613" style={{width:"100%",padding:"8px 10px",border:`1px solid ${G.border}`,borderRadius:6,fontSize:13}}/>
              </div>
            </div>
            <div style={{background:G.bg,borderRadius:10,padding:12,marginBottom:10}}>
              <div style={{fontSize:12,fontWeight:600,color:G.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:".04em"}}>Importes</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div>
                  <label style={{fontSize:11,color:G.blue,display:"block",marginBottom:3}}>💳 QR / Débito</label>
                  <input type="number" value={mQR} onChange={e=>setMQR(e.target.value)} placeholder="0" style={{width:"100%",padding:"8px 10px",border:`1px solid ${G.blueBorder}`,borderRadius:6,fontSize:13,background:G.blueBg}}/>
                </div>
                <div>
                  <label style={{fontSize:11,color:"#7c3aed",display:"block",marginBottom:3}}>Crédito</label>
                  <input type="number" value={mCred} onChange={e=>setMCred(e.target.value)} placeholder="0" style={{width:"100%",padding:"8px 10px",border:"1px solid #e9d5ff",borderRadius:6,fontSize:13,background:"#faf5ff"}}/>
                </div>
              </div>
              <div style={{marginTop:10,padding:"10px 12px",background:G.card,borderRadius:8,border:`1px solid ${G.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:12,color:G.muted}}>Total calculado:</span>
                <span style={{fontSize:15,fontWeight:800,color:G.text}}>{fmt((parseFloat(mQR)||0)+(parseFloat(mCred)||0))}</span>
              </div>
            </div>
            {mError&&<div style={{padding:"8px 12px",background:G.redBg,borderRadius:8,color:G.red,fontSize:13,marginBottom:10}}>{mError}</div>}
            <button onClick={async()=>{
              if(!mFecha||(!mQR&&!mCred)){setMError("Completá al menos la fecha y un importe.");return;}
              const qr=parseFloat(mQR)||0;
              const cred=parseFloat(mCred)||0;
              const total=qr+cred;
              const cierre=calcCierre({terminal:mTerminal,fecha:mFecha,hora:mHora,nroLote:mLote,nroComercio:mComercio,qrDebito:qr,credito:cred,totalPesos:total,comisionPct:comisionPct||0.095});
              await db.createCierre(mapCierre(cierre,clientId));
              setMFecha("");setMHora("");setMTerminal("");setMLote("");setMComercio("");setMQR("");setMCred("");setMError("");setShowManual(false);
              load();
            }} style={{width:"100%",padding:"10px",background:G.blue,color:"#fff",border:"none",borderRadius:8,fontWeight:600,fontSize:14,cursor:"pointer"}}>
              Guardar cierre manual
            </button>
          </div>
        )}
        {loading&&<div style={{display:"flex",alignItems:"center",gap:10,padding:12,background:G.blueBg,borderRadius:10,marginBottom:12}}><Spinner/><span style={{fontSize:14,color:G.blue}}>Leyendo ticket con IA...</span></div>}
        {error&&<div style={{padding:12,background:G.redBg,borderRadius:10,color:G.red,fontSize:14,marginBottom:12}}>{error}</div>}
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          {[["cierres","Cierres"],["cuenta","Cuenta Corriente"]].map(([t,l])=>(
            <button key={t} onClick={()=>setClientTab(t)} style={{padding:"7px 16px",borderRadius:8,border:"none",fontWeight:600,fontSize:13,background:clientTab===t?G.blue:G.card,color:clientTab===t?"#fff":G.muted}}>{l}</button>
          ))}
        </div>

        {clientTab==="cierres"&&(()=>{
          const cf=periodoCliente==="todo"?cierres:cierres.filter(c=>{
            if(!c.fecha)return false;
            const[d,m,y]=c.fecha.split("/");
            return new Date(`${y}-${m}-${d}`).toLocaleDateString("es-AR",{month:"long",year:"numeric"})===periodoCliente;
          });
          const totTotal=cf.reduce((a,r)=>a+r.totalPesos,0);
          const totQR=cf.reduce((a,r)=>a+r.qrDebito,0);
          const totCred=cf.reduce((a,r)=>a+r.credito,0);
          const totCom=cf.reduce((a,r)=>a+r.comisionMonto,0);
          return cf.length>0?(
            <div style={{background:G.dark,borderRadius:14,padding:16,marginBottom:16,color:"#fff"}}>
              <div style={{fontSize:11,color:"#94a3b8",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.05em"}}>RESUMEN TOTAL</div>
              <div style={{fontSize:28,fontWeight:800,color:"#34d399",marginBottom:12}}>{fmt(totTotal)}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {[["QR/Débito",fmt(totQR),"#60a5fa"],["Crédito",fmt(totCred),"#a78bfa"],["Comisión",fmt(totCom),"#f87171"],["Neto",fmt(totTotal-totCom),"#34d399"]].map(([l,v,c])=>(
                  <div key={l} style={{background:G.darkCard,borderRadius:8,padding:"8px 12px"}}>
                    <div style={{fontSize:11,color:"#94a3b8",marginBottom:2}}>{l}</div>
                    <div style={{fontWeight:700,color:c,fontSize:15}}>{v}</div>
                  </div>
                ))}
              </div>
            </div>
          ):null;
        })()}
        {clientTab==="cierres"&&cierres.length>0&&(()=>{
          const mesesCli=[];
          cierres.forEach(c=>{
            if(!c.fecha)return;
            const[d,m,y]=c.fecha.split("/");
            const mes=new Date(`${y}-${m}-${d}`).toLocaleDateString("es-AR",{month:"long",year:"numeric"});
            if(!mesesCli.includes(mes))mesesCli.push(mes);
          });
          if(mesesCli.length<2)return null;
          return(
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <span style={{fontSize:12,color:G.muted,fontWeight:600}}>Ver período:</span>
              <select value={periodoCliente} onChange={e=>setPeriodoCliente(e.target.value)}
                style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${G.blue}`,background:G.blue,color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",outline:"none"}}>
                <option value="todo" style={{background:"#fff",color:G.text}}>Todos</option>
                {mesesCli.map(m=>(
                  <option key={m} value={m} style={{background:"#fff",color:G.text}}>{m.charAt(0).toUpperCase()+m.slice(1)}</option>
                ))}
              </select>
            </div>
          );
        })()}
        {clientTab==="cierres"&&sortCierres(periodoCliente==="todo"?cierres:cierres.filter(c=>{if(!c.fecha)return false;const[d,m,y]=c.fecha.split("/");return new Date(`${y}-${m}-${d}`).toLocaleDateString("es-AR",{month:"long",year:"numeric"})===periodoCliente;})).map(r=>(
          <div key={r.id} className="anim" style={{background:G.card,border:`1px solid ${G.border}`,borderRadius:12,marginBottom:10,overflow:"hidden"}}>
            <div onClick={()=>setExpanded(expanded===r.id?null:r.id)} style={{padding:"12px 14px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontWeight:700,fontSize:15}}>{fmt(r.totalPesos)}</div>
                <div style={{color:G.muted,fontSize:12}}>{r.fecha} · {r.hora||""} · Terminal {r.terminal}</div>
              </div>
              <div style={{fontSize:20,color:G.muted}}>{expanded===r.id?"▲":"▼"}</div>
            </div>
            {expanded===r.id&&(
              <div style={{padding:"0 14px 14px",borderTop:`1px solid ${G.border}`}}>
                <div style={{display:"grid",gridTemplateColumns:r.qrDebito>0&&r.credito>0?"1fr 1fr":"1fr",gap:8,margin:"12px 0"}}>
                  {r.qrDebito>0&&(<div style={{background:G.blueBg,border:`1px solid ${G.blueBorder}`,borderRadius:10,padding:"10px 12px"}}>
                    <div style={{fontSize:11,color:G.blue,marginBottom:2}}>QR/DÉBITO</div>
                    <div style={{fontWeight:700,fontSize:15}}>{fmt(r.qrDebito)}</div>
                    <div style={{fontSize:11,color:G.muted,marginTop:2}}>Acred: {r.fechaAcredQR}</div>
                  </div>)}
                  {r.credito>0&&(<div style={{background:"#faf5ff",border:"1px solid #e9d5ff",borderRadius:10,padding:"10px 12px"}}>
                    <div style={{fontSize:11,color:"#7c3aed",marginBottom:2}}>CRÉDITO</div>
                    <div style={{fontWeight:700,fontSize:15}}>{fmt(r.credito)}</div>
                    <div style={{fontSize:11,color:G.muted,marginTop:2}}>Acred: {r.fechaAcredCredito}</div>
                  </div>)}
                </div>
                <div style={{fontSize:12,color:G.muted,marginBottom:8}}>Lote: {r.nroLote} · Comercio: {r.nroComercio||"-"} · Com: {fmt(r.comisionMonto)} · Neto: {fmt(r.saldoNeto)}</div>
                <button onClick={async()=>{if(confirm("¿Eliminar?"))await db.deleteCierre(r.id).then(load);}} style={{fontSize:12,color:G.red,background:G.redBg,border:"none",borderRadius:6,padding:"4px 10px"}}>Eliminar</button>
              </div>
            )}
          </div>
        ))}
        {clientTab==="cierres"&&(periodoCliente==="todo"?cierres:cierres.filter(c=>{const[d,m,y]=c.fecha.split("/");return new Date(`${y}-${m}-${d}`).toLocaleDateString("es-AR",{month:"long",year:"numeric"})===periodoCliente;})).length===0&&!loading&&(
          <div style={{textAlign:"center",padding:"40px 0",color:G.muted}}>
            <div style={{fontSize:40,marginBottom:8}}>📋</div>
            <div style={{fontWeight:600}}>Sin cierres cargados</div>
            <div style={{fontSize:13}}>Subí las fotos de los tickets para comenzar</div>
          </div>
        )}
        {clientTab==="cuenta"&&<CuentaCorriente cierres={cierres} retiros={retiros} clientId={clientId} load={load} clientName={clientName}/>}
      </div>
    </div>
  );
}

function AdminView({onLogout,apiKey}){
  const[tab,setTab]=useState("resumen");
  const[clients,setClients]=useState([]);
  const[allCierres,setAllCierres]=useState([]);
  const[allRetiros,setAllRetiros]=useState([]);
  const[allCierresRaw,setAllCierresRaw]=useState([]);
  const[selClient,setSelClient]=useState(null);
  const[screen,setScreen]=useState("dash");
  const[activeMonth,setActiveMonth]=useState("todo");
  const[newUser,setNewUser]=useState({nombre:"",username:"",password:"",comision:"0.095",proveedor:""});
  const[loading,setLoading]=useState(false);

  const loadData=useCallback(async()=>{
    setLoading(true);
    try{
      const cls=await db.getClients();
      setClients(cls||[]);
      const allC=await Promise.all((cls||[]).map(c=>db.getCierres(c.client_id||c.username)));
      const allR=await Promise.all((cls||[]).map(c=>db.getRetiros(c.client_id||c.username)));
      // Save all cierres unfiltered for month list
      setAllCierresRaw(allC.flat());
      const filterByMonth=(arr)=>{
        if(activeMonth==="todo")return arr.flat().filter(r=>r.fecha);
        return arr.flat().filter(r=>{
          if(!r.fecha)return false;
          const[d,m,y]=r.fecha.split("/");
          return new Date(`${y}-${m}-${d}`).toLocaleDateString("es-AR",{month:"long",year:"numeric"})===activeMonth;
        });
      };
      setAllCierres(filterByMonth(allC));
      setAllRetiros(filterByMonth(allR));
    }catch(e){}
    setLoading(false);
  },[activeMonth]);

  useEffect(()=>{loadData();},[loadData]);

  if(screen==="detail"&&selClient){
    return<ClientView clientName={selClient.nombre||selClient.username} comisionPct={selClient.comision||0.095} clientId={selClient.client_id||selClient.username} onBack={()=>{setScreen("dash");loadData();}} onLogout={onLogout} apiKey={apiKey}/>;
  }

  const byClient=clients.map(c=>{
    const cc=allCierres.filter(r=>r.client_id===(c.client_id||c.username));
    const vendido=cc.reduce((a,r)=>a+(r.total_pesos||0),0);
    const aCobrar=cc.reduce((a,r)=>a+(r.comision_monto||0),0);
    return{...c,vendido,aCobrar,acreditado:0,pendiente:aCobrar,cierresCount:cc.length};
  });

  return(
    <div style={{minHeight:"100vh",background:G.bg}}>
      <div style={{background:G.card,borderBottom:`1px solid ${G.border}`,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:10}}>
        <span style={{fontWeight:700,fontSize:16}}>Panel Admin</span>
        <button onClick={onLogout} style={{background:G.bg,color:G.muted,border:`1px solid ${G.border}`,borderRadius:8,padding:"6px 12px",fontSize:13}}>Salir</button>
      </div>
      <div style={{maxWidth:700,margin:"0 auto",padding:16}}>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          {["resumen","clientes"].map(t=>(
            <button key={t} onClick={()=>setTab(t)} style={{padding:"8px 18px",borderRadius:8,border:"none",fontWeight:600,fontSize:14,background:tab===t?G.blue:G.card,color:tab===t?"#fff":G.muted}}>
              {t==="resumen"?"Resumen":"Clientes"}
            </button>
          ))}
        </div>
        {tab==="resumen"&&(
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
              <span style={{fontSize:13,color:G.muted,fontWeight:600}}>Mes:</span>
              <select value={activeMonth} onChange={e=>setActiveMonth(e.target.value)}
                style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${G.blue}`,background:G.blue,color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",outline:"none"}}>
                <option value="todo" style={{background:"#fff",color:G.text}}>Todo</option>
                {(()=>{
                  const meses=[];
                  clients.forEach(c=>{
                    const cc=allCierresRaw.filter(r=>r.client_id===(c.client_id||c.username));
                    cc.forEach(r=>{
                      if(!r.fecha)return;
                      const[d,m,y]=r.fecha.split("/");
                      const mes=new Date(`${y}-${m}-${d}`).toLocaleDateString("es-AR",{month:"long",year:"numeric"});
                      if(!meses.includes(mes))meses.push(mes);
                    });
                  });
                  meses.sort((a,b)=>new Date(b.split(" de ")[1],["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"].indexOf(a.split(" de ")[0]),1)-new Date(a.split(" de ")[1],["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"].indexOf(b.split(" de ")[0]),1));
                  return meses.map(m=>(
                    <option key={m} value={m} style={{background:"#fff",color:G.text}}>{m.charAt(0).toUpperCase()+m.slice(1)}</option>
                  ));
                })()}
              </select>
            </div>
            {loading?<div style={{textAlign:"center",padding:40}}><Spinner/></div>:(
              <div>
                <div style={{background:G.dark,borderRadius:14,padding:20,marginBottom:20,color:"#fff"}}>
                  <div style={{fontSize:11,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>{activeMonth==="todo"?"TODO EL PERÍODO":activeMonth.toUpperCase()} · TU FACTURACIÓN</div>
                  <div style={{fontSize:32,fontWeight:800,color:"#34d399",marginBottom:16}}>{fmt(byClient.reduce((a,c)=>a+c.aCobrar,0))}</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    {[["COM. TARJETAS",fmt(byClient.reduce((a,c)=>a+c.aCobrar,0)),"#60a5fa"],["VENDIDO TOTAL",fmt(byClient.reduce((a,c)=>a+c.vendido,0)),"#a78bfa"],["CLIENTES",byClient.filter(c=>c.cierresCount>0).length+" activos","#34d399"],["CIERRES",allCierres.length+" este mes","#fbbf24"]].map(([l,v,c])=>(
                      <div key={l} style={{background:G.darkCard,borderRadius:8,padding:"10px 12px"}}>
                        <div style={{fontSize:10,color:"#94a3b8",marginBottom:2}}>{l}</div>
                        <div style={{fontWeight:700,color:c,fontSize:16}}>{v}</div>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{background:G.card,borderRadius:12,border:`1px solid ${G.border}`,overflow:"hidden"}}>
                  <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",padding:"8px 14px",background:G.bg,fontSize:11,color:G.muted,fontWeight:600,textTransform:"uppercase"}}>
                    {["CLIENTE","VENDIDO","A COBRAR","CIERRES"].map(h=><div key={h}>{h}</div>)}
                  </div>
                  {(()=>{
                    const provs=[...new Set(byClient.map(c=>c.proveedor||""))].sort((a,b)=>a===''?1:b===''?-1:a.localeCompare(b));
                    return provs.map(prov=>{
                      const grupo=byClient.filter(c=>(c.proveedor||"")===prov);
                      if(!grupo.length)return null;
                      return(
                        <div key={prov||"x"}>
                          {prov&&<div style={{padding:"6px 14px",background:"#f1f5f9",borderTop:`1px solid ${G.border}`,display:"flex",justifyContent:"space-between"}}>
                            <span style={{fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:".05em"}}>📦 {prov}</span>
                            <span style={{fontSize:11,fontWeight:700,color:G.green}}>{fmt(grupo.reduce((a,c)=>a+c.aCobrar,0))}</span>
                          </div>}
                          {grupo.map(c=>(
                            <div key={c.username} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",padding:"12px 14px",borderTop:`1px solid ${G.border}`,alignItems:"center"}}>
                              <div>
                                <div style={{fontWeight:600,fontSize:14,cursor:"pointer",color:G.blue}} onClick={()=>{setSelClient(c);setScreen("detail");}}>{c.nombre||c.username}</div>
                                <div style={{fontSize:11,color:G.muted}}>Com. {((c.comision||0.095)*100).toFixed(1)}%{c.proveedor?" · "+c.proveedor:""}</div>
                              </div>
                              <div style={{fontWeight:600,color:G.blue,fontSize:13}}>{fmt(c.vendido)}</div>
                              <div style={{fontWeight:600,color:G.green,fontSize:13}}>{fmt(c.aCobrar)}</div>
                              <div style={{fontSize:13,color:G.muted}}>{c.cierresCount}</div>
                            </div>
                          ))}
                        </div>
                      );
                    });
                  })()}}
                  <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",padding:"12px 14px",borderTop:`2px solid ${G.border}`,background:G.bg}}>
                    <div style={{fontWeight:700}}>TOTAL</div>
                    <div style={{fontWeight:700,color:G.blue,fontSize:13}}>{fmt(byClient.reduce((a,c)=>a+c.vendido,0))}</div>
                    <div style={{fontWeight:700,color:G.green,fontSize:13}}>{fmt(byClient.reduce((a,c)=>a+c.aCobrar,0))}</div>
                    <div style={{fontSize:13,color:G.muted}}>{allCierres.length}</div>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}
        {tab==="clientes"&&(
          <div>
            <div style={{background:G.card,border:`1px solid ${G.border}`,borderRadius:12,padding:16,marginBottom:16}}>
              <div style={{fontWeight:600,marginBottom:12}}>+ Nuevo cliente</div>
              {[["Nombre completo","nombre","text"],["Usuario","username","text"],["Contraseña","password","text"],["Comisión (ej: 0.095)","comision","number"],["Proveedor (ej: Fran, Mario)","proveedor","text"]].map(([label,key,type])=>(
                <div key={key} style={{marginBottom:8}}>
                  <label style={{fontSize:12,color:G.muted,display:"block",marginBottom:2}}>{label}</label>
                  <input type={type} value={newUser[key]} onChange={e=>setNewUser({...newUser,[key]:e.target.value})} style={{width:"100%",padding:"8px 10px",border:`1px solid ${G.border}`,borderRadius:6,fontSize:14}}/>
                </div>
              ))}
              <button onClick={async()=>{
                if(!newUser.username||!newUser.password)return;
                await db.createUser({username:newUser.username,password:newUser.password,role:"client",nombre:newUser.nombre||newUser.username,comision:parseFloat(newUser.comision)||0.095,client_id:newUser.username,proveedor:newUser.proveedor||""});
                setNewUser({nombre:"",username:"",password:"",comision:"0.095",proveedor:""});loadData();
              }} style={{background:G.blue,color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:14,fontWeight:600}}>Crear cliente</button>
            </div>
            {clients.map(c=>(
              <div key={c.username} style={{background:G.card,border:`1px solid ${G.border}`,borderRadius:10,padding:14,marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontWeight:600}}>{c.nombre||c.username}</div>
                  <div style={{fontSize:12,color:G.muted}}>@{c.username} · Com. {((c.comision||0.095)*100).toFixed(1)}%</div>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{setSelClient(c);setScreen("detail");}} style={{fontSize:13,background:G.blueBg,color:G.blue,border:`1px solid ${G.blueBorder}`,borderRadius:6,padding:"5px 10px"}}>Ver cierres</button>
                  <button onClick={async()=>{if(confirm("¿Eliminar cliente?"))await db.deleteUser(c.username).then(loadData);}} style={{fontSize:13,background:G.redBg,color:G.red,border:"none",borderRadius:6,padding:"5px 10px"}}>✕</button>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function App(){
  const[session,setSession]=useState(null);
  const[apiKey,setApiKeyRaw]=useState(null);
  const[booting,setBooting]=useState(true);
  const saveApiKey=useCallback(k=>{setApiKeyRaw(k);sSet("pn_apikey_v2",k);},[]);
  useEffect(()=>{setApiKeyRaw(sGet("pn_apikey_v2")||null);setBooting(false);},[]);
  if(booting)return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><Spinner/></div>);
  if(!apiKey)return<ApiKeyScreen onSave={saveApiKey}/>;
  if(!session)return<Login onLogin={(u,role,cid,nombre,comision)=>setSession({u,role,cid,nombre,comision})}/>;
  if(session.role==="admin")return<AdminView onLogout={()=>setSession(null)} apiKey={apiKey}/>;
  return<ClientView clientName={session.nombre} comisionPct={session.comision} clientId={session.cid} onBack={null} onLogout={()=>setSession(null)} apiKey={apiKey}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
