<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Posnet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f5f6fa;--white:#ffffff;--surface:#f0f2f8;
    --border:#e2e5ef;--border2:#d0d4e8;
    --blue:#2563eb;--blue2:#3b82f6;--blue-light:#eff6ff;
    --green:#16a34a;--green-light:#f0fdf4;--green-border:#bbf7d0;
    --yellow:#d97706;--yellow-light:#fffbeb;--yellow-border:#fde68a;
    --red:#dc2626;--red-light:#fef2f2;--red-border:#fecaca;
    --purple:#7c3aed;--purple-light:#f5f3ff;
    --text:#0f172a;--text2:#64748b;--text3:#94a3b8;
    --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
    --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.05);
    --shadow-lg:0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);
  }
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}
  #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#f0f4ff 0%,#fafbff 100%)}
  .login-box{background:var(--white);border-radius:16px;padding:40px;width:380px;box-shadow:var(--shadow-lg);border:1px solid var(--border)}
  .login-brand{display:flex;align-items:center;gap:10px;margin-bottom:28px}
  .login-icon{width:40px;height:40px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
  .login-name{font-size:18px;font-weight:700;color:var(--text)}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px}
  .field input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;transition:border-color .15s,box-shadow .15s}
  .field input:focus{border-color:var(--blue2);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
  .btn-login{width:100%;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:11px;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;margin-top:4px}
  .btn-login:hover{background:#1d4ed8}
  .err{color:var(--red);font-size:12px;margin-top:10px;text-align:center;min-height:16px}
  #app{display:none;min-height:100vh}
  .sidebar{width:220px;background:var(--white);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;box-shadow:var(--shadow)}
  .sb-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
  .sb-icon{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
  .sb-texts .sb-brand{font-size:11px;font-weight:600;color:var(--blue);letter-spacing:1px;text-transform:uppercase}
  .sb-texts .sb-title{font-size:13px;font-weight:600;color:var(--text);margin-top:1px}
  .sb-user{padding:12px 18px 8px;border-bottom:1px solid var(--border);margin-bottom:8px}
  .sb-role{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:500}
  .sb-name{font-size:13px;font-weight:600;color:var(--text);margin-top:2px}
  .nav{padding:0 10px}
  .nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .12s;margin-bottom:2px}
  .nav-item:hover{color:var(--text);background:var(--bg)}
  .nav-item.active{color:var(--blue);background:var(--blue-light);font-weight:600}
  .nav-icon{font-size:15px;width:18px;text-align:center}
  .sb-bottom{margin-top:auto;padding:16px 18px;border-top:1px solid var(--border)}
  .btn-out{width:100%;background:transparent;border:1.5px solid var(--border);border-radius:8px;padding:8px;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all .15s}
  .btn-out:hover{border-color:var(--red);color:var(--red)}
  .main{margin-left:220px;padding:28px 32px;min-height:100vh}
  .ph{margin-bottom:24px}
  .ph-top{display:flex;align-items:flex-start;justify-content:space-between}
  .ph-title{font-size:22px;font-weight:700;color:var(--text)}
  .ph-sub{font-size:13px;color:var(--text2);margin-top:3px}
  .back-btn{display:inline-flex;align-items:center;gap:5px;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;background:none;border:none;font-family:var(--sans);margin-bottom:12px;padding:4px 8px;border-radius:6px;transition:all .12s}
  .back-btn:hover{color:var(--blue);background:var(--blue-light)}
  .btn{border:none;border-radius:8px;padding:8px 16px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
  .btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#1d4ed8}
  .btn-ghost{background:var(--white);border:1.5px solid var(--border);color:var(--text2)}.btn-ghost:hover{border-color:var(--blue2);color:var(--blue)}
  .btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#15803d}
  .btn-danger{background:transparent;border:1.5px solid var(--border);color:var(--text3);font-size:12px}.btn-danger:hover{border-color:var(--red);color:var(--red)}
  .btn-sm{padding:5px 10px;font-size:12px}
  .tabs{display:flex;gap:2px;margin-bottom:20px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:3px;width:fit-content}
  .tab{padding:7px 18px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .15s;border:none;background:transparent;font-family:var(--sans)}
  .tab.active{background:var(--white);color:var(--blue);box-shadow:var(--shadow);font-weight:600}
  .client-card{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .15s;margin-bottom:10px;box-shadow:var(--shadow)}
  .client-card:hover{border-color:var(--blue2);box-shadow:var(--shadow-md);transform:translateY(-1px)}
  .cl-name{font-size:15px;font-weight:600}
  .cl-meta{font-size:12px;color:var(--text2);font-family:var(--mono);margin-top:3px}
  .cl-stats{display:flex;gap:24px;align-items:center}
  .stat-box{text-align:right}
  .stat-lbl{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.3px}
  .stat-val{font-family:var(--mono);font-size:15px;font-weight:700;margin-top:2px}
  .stat-val.g{color:var(--green)}
  .stat-val.y{color:var(--yellow)}
  .upload-zone{border:2px dashed var(--border2);border-radius:12px;padding:36px;text-align:center;cursor:pointer;transition:all .15s;background:var(--white)}
  .upload-zone:hover,.upload-zone.drag{border-color:var(--blue2);background:var(--blue-light)}
  .upload-icon{font-size:36px;margin-bottom:10px}
  .upload-text{font-size:14px;font-weight:500;color:var(--text2)}
  .upload-sub{font-size:12px;color:var(--text3);margin-top:4px}
  #file-input{display:none}
  .confirm-card{background:var(--white);border:1.5px solid var(--border2);border-radius:14px;padding:20px;margin-bottom:14px;box-shadow:var(--shadow-md)}
  .confirm-card.loading{border-color:var(--border)}
  .confirm-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .confirm-filename{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
  .confirm-status-ok{background:var(--green-light);color:var(--green);font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid var(--green-border)}
  .confirm-fields{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
  .cf-field{background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;transition:border-color .12s}
  .cf-field:focus-within{border-color:var(--blue2);background:var(--blue-light)}
  .cf-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
  .cf-input{width:100%;background:transparent;border:none;color:var(--text);font-family:var(--mono);font-size:15px;font-weight:600;outline:none}
  .cf-monto{grid-column:span 3;background:linear-gradient(135deg,var(--green-light),#dcfce7);border:1.5px solid var(--green-border);border-radius:10px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
  .cf-monto-left .cf-monto-label{font-size:12px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:.5px}
  .cf-monto-detail{font-size:12px;color:var(--text2);margin-top:4px}
  .cf-monto-detail span{font-family:var(--mono);font-weight:600}
  .cf-neto{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--green)}
  .confirm-actions{display:flex;gap:8px;justify-content:flex-end;align-items:center}
  .cierre-card{background:var(--white);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow)}
  .cierre-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .12s}
  .cierre-header:hover{background:var(--bg)}
  .cierre-left{display:flex;align-items:center;gap:12px}
  .trm-badge{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--blue);background:var(--blue-light);padding:4px 9px;border-radius:6px;border:1px solid #bfdbfe}
  .ci-title{font-size:13px;font-weight:600;color:var(--text)}
  .ci-date{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:2px}
  .cierre-right{display:flex;gap:20px;align-items:center}
  .ca{text-align:right}
  .ca-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}
  .ca-val{font-family:var(--mono);font-size:14px;font-weight:700;margin-top:2px}
  .ca-val.g{color:var(--green)}
  .ca-val.gray{color:var(--text2)}
  .chevron{color:var(--text3);font-size:12px}
  .cierre-body{padding:14px 18px;border-top:1px solid var(--border);display:none;background:var(--bg)}
  .cierre-body.open{display:block}
  .detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
  .detail-box{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
  .db-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}
  .db-val{font-family:var(--mono);font-size:16px;font-weight:700;margin-top:4px;color:var(--text)}
  .acred-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .abadge{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500}
  .abadge.ok{background:var(--green-light);color:var(--green);border:1px solid var(--green-border)}
  .abadge.pend{background:var(--yellow-light);color:var(--yellow);border:1px solid var(--yellow-border)}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
  .fin-hero{display:grid;grid-template-columns:2fr 1fr 1fr;gap:14px;margin-bottom:20px}
  .fin-saldo{background:linear-gradient(135deg,#1e40af,#2563eb);color:#fff;border-radius:14px;padding:24px 28px;box-shadow:0 4px 20px rgba(37,99,235,.3)}
  .fin-saldo .fs-label{font-size:12px;font-weight:600;opacity:.8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
  .fin-saldo .fs-val{font-family:var(--mono);font-size:36px;font-weight:700;letter-spacing:-1px}
  .fin-saldo .fs-sub{font-size:12px;opacity:.7;margin-top:6px}
  .fin-mini{background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow)}
  .fin-mini .fm-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
  .fin-mini .fm-val{font-family:var(--mono);font-size:22px;font-weight:700}
  .fin-mini .fm-val.g{color:var(--green)}
  .fin-mini .fm-val.y{color:var(--yellow)}
  .fin-mini .fm-val.r{color:var(--red)}
  .fin-mini .fm-sub{font-size:11px;color:var(--text3);margin-top:4px}
  .comision-bar{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:20px;box-shadow:var(--shadow)}
  .comision-bar-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
  .comision-bar-row{display:flex;border-radius:8px;overflow:hidden;height:40px;margin-bottom:10px}
  .cb-bruto{background:#dbeafe;display:flex;align-items:center;padding:0 14px;font-size:12px;font-weight:600;color:var(--blue);flex:1}
  .cb-comision{background:#fee2e2;display:flex;align-items:center;padding:0 14px;font-size:12px;font-weight:600;color:var(--red)}
  .comision-nums{display:flex;gap:24px}
  .cn-item{display:flex;flex-direction:column}
  .cn-label{font-size:11px;color:var(--text3);font-weight:500}
  .cn-val{font-family:var(--mono);font-size:15px;font-weight:700;margin-top:2px}
  .cn-val.b{color:var(--blue)}.cn-val.r{color:var(--red)}.cn-val.g{color:var(--green)}
  .fin-section-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .timeline{display:grid;gap:8px;margin-bottom:20px}
  .tl-row{background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow)}
  .tl-row.past{opacity:.6}
  .tl-row.today{border-color:var(--blue2);background:var(--blue-light)}
  .tl-row.next{border-color:var(--yellow-border);background:var(--yellow-light)}
  .tl-date{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text)}
  .tl-desc{font-size:12px;color:var(--text2);margin-top:2px}
  .tl-right{display:flex;align-items:center;gap:10px}
  .tl-amt{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--text)}
  .pill{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
  .pill.g{background:var(--green-light);color:var(--green);border:1px solid var(--green-border)}
  .pill.y{background:var(--yellow-light);color:var(--yellow);border:1px solid var(--yellow-border)}
  .pill.b{background:var(--blue-light);color:var(--blue);border:1px solid #bfdbfe}
  .pago-form{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow)}
  .pago-form-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
  .pago-inputs{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
  .pago-inputs .field{margin:0;flex:1;min-width:120px}
  .pagos-list{display:grid;gap:8px}
  .pago-row{background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow)}
  .pr-date{font-size:11px;color:var(--text3);font-family:var(--mono)}
  .pr-desc{font-size:13px;font-weight:500;margin-top:2px}
  .pr-monto{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--red)}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
  .modal-overlay.open{display:flex}
  .modal{background:var(--white);border-radius:14px;padding:28px;width:100%;max-width:400px;box-shadow:var(--shadow-lg)}
  .modal-title{font-size:16px;font-weight:700;margin-bottom:20px}
  .modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
  .spinner{width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:13px}
  .empty-icon{font-size:32px;margin-bottom:10px}
  .toast{position:fixed;bottom:20px;right:20px;background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:12px 18px;font-size:13px;font-weight:500;z-index:200;display:none;box-shadow:var(--shadow-lg)}
  .toast.show{display:block}
  .toast.ok{border-color:var(--green-border);color:var(--green)}
  .toast.err{border-color:var(--red-border);color:var(--red)}
  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
  .divider{height:1px;background:var(--border);margin:20px 0}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-brand">
      <div class="login-icon">💳</div>
      <div>
        <div class="login-name">Control Posnet</div>
        <div style="font-size:12px;color:var(--text2);margin-top:1px">Sistema de gestión de cierres</div>
      </div>
    </div>
    <div class="field"><label>Usuario</label><input type="text" id="login-user" autocomplete="off" placeholder="Tu usuario"></div>
    <div class="field"><label>Contraseña</label><input type="password" id="login-pass" placeholder="••••••••"></div>
    <button class="btn-login" onclick="doLogin()">Ingresar →</button>
    <div class="err" id="login-err"></div>
  </div>
</div>

<div id="app">
  <div class="sidebar">
    <div class="sb-logo">
      <div class="sb-icon">💳</div>
      <div class="sb-texts">
        <div class="sb-brand">Control</div>
        <div class="sb-title">Posnet B</div>
      </div>
    </div>
    <div class="sb-user">
      <div class="sb-role" id="sb-role"></div>
      <div class="sb-name" id="sb-name"></div>
    </div>
    <div class="nav">
      <div class="nav-item active" onclick="showSection('cierres')" id="nav-cierres"><span class="nav-icon">📋</span> Cierres</div>
      <div class="nav-item" onclick="showSection('financiero')" id="nav-financiero"><span class="nav-icon">📊</span> Financiero</div>
      <div class="nav-item" onclick="showSection('clientes')" id="nav-clientes" style="display:none"><span class="nav-icon">👥</span> Clientes</div>
    </div>
    <div class="sb-bottom"><button class="btn-out" onclick="doLogout()">Cerrar sesión</button></div>
  </div>
  <div class="main" id="main-content"></div>
</div>

<div class="modal-overlay" id="modal-cliente">
  <div class="modal">
    <div class="modal-title">➕ Nuevo cliente</div>
    <div class="field"><label>Nombre</label><input type="text" id="nc-nombre" placeholder="Nombre del negocio"></div>
    <div class="field"><label>Usuario</label><input type="text" id="nc-user" placeholder="usuario"></div>
    <div class="field"><label>Contraseña</label><input type="text" id="nc-pass" placeholder="contraseña"></div>
    <div class="field"><label>Comisión (%)</label><input type="number" id="nc-comision" placeholder="9.5" step="0.1"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-blue" onclick="saveNewClient()">Guardar cliente</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://wwoymrlwsagwqakxxujk.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3b3ltcmx3c2Fnd3Fha3h4dWprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0OTg2NTEsImV4cCI6MjA5MzA3NDY1MX0.f-d6mzXafLNzw6nYM_Ijjq7vNESw_UdRkv8VgxLPuQg';
let session=null,currentSection='cierres',viewingClientId=null;

async function sb(path,opts={}){
  const{headers:eh,...rest}=opts;
  const r=await fetch(SUPABASE_URL+'/rest/v1/'+path,{...rest,headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,...(eh||{})}});
  if(!r.ok){const e=await r.text();throw new Error(e);}
  return r.status===204?null:r.json();
}

async function doLogin(){
  const u=document.getElementById('login-user').value.trim();
  const p=document.getElementById('login-pass').value.trim();
  if(!u||!p)return;
  try{
    const rows=await db.getUser(u);
    if(!rows||!rows[0])return showErr('Usuario no encontrado');
    if(rows[0].password!==p)return showErr('Contraseña incorrecta');
    session=rows[0];startApp();
  }catch(e){showErr('Error: '+e.message);}
}
function showErr(m){document.getElementById('login-err').textContent=m;}
document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function startApp(){
  document.getElementById('login-screen').style.display='none';

async function extractFromImage(base64,mediaType){
  const resp=await fetch('/api/claude',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',max_tokens:600,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
        {type:'text',text:`Lee este ticket de cierre de lote de posnet argentino. Responde SOLO JSON sin texto extra ni backticks:
{"terminal":"numero","fecha":"DD/MM/YYYY","hora":"HH:MM:SS","nroLote":"numero","nroComercio":"","qrDebito":numero,"credito":numero,"totalPesos":numero}
- qrDebito: suma VISA DEBITO + MASTERCARD PREPAGO + QR + TRANSFERENCIA INMEDIATA
- credito: MASTERCARD credito + VISA credito + AMEX (excluir debito/prepago/QR/transferencia)
- totalPesos: suma de qrDebito + credito
- Numeros sin $ ni puntos separadores. Campos ausentes = 0 o "".`}
      ]}]
    })
  });
  if(!resp.ok){const e=await resp.text();throw new Error('API '+resp.status+': '+e);}
  const r=await resp.json();
  if(!r.content?.length)throw new Error('Sin respuesta de la IA');
  const text=r.content.map(b=>b.text||'').join('');
  return JSON.parse(text.replace(/```json|```/g,'').trim());
}

function renderFinanciero(el,cierres,retiros,cid){
  const hoy=todayStr();
  const nombre=session.role==='client'?session.nombre:session._vNombre;
  const comision=session.role==='client'?session.comision:(session._vComision||0.095);
  const acHoy=calcAcreditado(cierres,hoy);
  const pendiente=calcPendiente(cierres,hoy);
  const totalPagos=retiros.reduce((s,r)=>s+parseFloat(r.monto||0),0);
  const saldo=acHoy-totalPagos;
  const totalBruto=cierres.reduce((s,c)=>s+parseFloat(c.total_pesos||0),0);
  const totalComision=cierres.reduce((s,c)=>s+parseFloat(c.comision_monto||0),0);
  const neto=totalBruto-totalComision;

  let html='';
  if(session.role==='admin'&&viewingClientId){
    html+=`<button class="back-btn" onclick="goBack()">← Volver a clientes</button>
    <div class="ph"><div class="ph-top"><div><div class="ph-title">📊 Financiero · ${nombre}</div><div class="ph-sub">Comisión: ${(comision*100).toFixed(1)}%</div></div></div></div>`;
  }else{
    html+=`<div class="ph"><div class="ph-top"><div><div class="ph-title">📊 Resumen financiero</div></div></div></div>`;
  }

  html+=`<div class="fin-hero">
    <div class="fin-saldo">
      <div class="fs-label">💰 Saldo disponible</div>
      <div class="fs-val">${fmt(saldo)}</div>
      <div class="fs-sub">Acreditado a hoy menos pagos recibidos</div>
    </div>
    <div class="fin-mini">
      <div class="fm-label">✅ Acreditado a hoy</div>
      <div class="fm-val g">${fmt(acHoy)}</div>
      <div class="fm-sub">Neto ya en tu cuenta</div>
    </div>
    <div class="fin-mini">
      <div class="fm-label">⏳ Pendiente de cobro</div>
      <div class="fm-val y">${fmt(pendiente)}</div>
      <div class="fm-sub">Próximas acreditaciones</div>
    </div>
  </div>`;

  const pctCom=totalBruto>0?Math.round((totalComision/totalBruto)*100):0;
  const pctNeto=100-pctCom;
  html+=`<div class="comision-bar">
    <div class="comision-bar-title">Desglose de comisiones</div>
    <div class="comision-bar-row">
      <div class="cb-bruto" style="width:${pctNeto}%">Neto ${pctNeto}%</div>
      <div class="cb-comision" style="width:${pctCom}%">Comisión ${pctCom}%</div>
    </div>
    <div class="comision-nums">
      <div class="cn-item"><div class="cn-label">Total bruto</div><div class="cn-val b">${fmt(totalBruto)}</div></div>
      <div class="cn-item"><div class="cn-label">Comisión (${(comision*100).toFixed(1)}%)</div><div class="cn-val r">- ${fmt(totalComision)}</div></div>
      <div class="cn-item"><div class="cn-label">Neto total</div><div class="cn-val g">${fmt(neto)}</div></div>
      <div class="cn-item"><div class="cn-label">Pagos recibidos</div><div class="cn-val r">- ${fmt(totalPagos)}</div></div>
      <div class="cn-item"><div class="cn-label">Saldo final</div><div class="cn-val g">${fmt(saldo)}</div></div>
    </div>
  </div>`;

  const eventos=[];
  for(const c of cierres){
    const com=parseFloat(c.comision_pct||0);
    if(c.qr_debito>0&&c.fecha_acred_qr)eventos.push({fecha:c.fecha_acred_qr,monto:parseFloat(c.qr_debito)-Math.round(parseFloat(c.qr_debito)*com),tipo:'QR/Débito',terminal:c.terminal,lote:c.nro_lote});
    if(c.credito>0&&c.fecha_acred_credito)eventos.push({fecha:c.fecha_acred_credito,monto:parseFloat(c.credito)-Math.round(parseFloat(c.credito)*com),tipo:'Crédito',terminal:c.terminal,lote:c.nro_lote});
  }
  const byFecha={};
  for(const e of eventos){if(!byFecha[e.fecha])byFecha[e.fecha]={total:0,items:[]};byFecha[e.fecha].total+=e.monto;byFecha[e.fecha].items.push(e);}
  const fechas=Object.keys(byFecha).sort();
  const nextPending=fechas.find(f=>f>hoy);

  html+=`<div class="fin-section-title">📅 Calendario de acreditaciones</div><div class="timeline">`;
  if(!fechas.length)html+=`<div class="empty" style="padding:24px;background:var(--white);border-radius:10px;border:1.5px solid var(--border)"><div class="empty-icon">📅</div>Sin cobros proyectados</div>`;
  for(const f of fechas){
    const past=f<hoy;
    const isToday=f===hoy;
    const isNext=f===nextPending;
    const gr=byFecha[f];
    const detail=gr.items.map(i=>`TRM ${i.terminal} · ${i.tipo}`).join(' &nbsp;/&nbsp; ');
    const cls=isToday?'today':isNext?'next':past?'past':'';
    const pill=isToday?`<span class="pill b">Hoy</span>`:past?`<span class="pill g">✓ Acreditado</span>`:`<span class="pill y">Pendiente</span>`;
    html+=`<div class="tl-row ${cls}">
      <div><div class="tl-date">${formatFecha(f)}</div><div class="tl-desc">${detail}</div></div>
      <div class="tl-right"><div class="tl-amt">${fmt(gr.total)}</div>${pill}</div>
    </div>`;
  }
  html+=`</div><div class="divider"></div>`;

  html+=`<div class="fin-section-title">💸 Pagos recibidos de la cueva</div>
  <div class="pago-form">
    <div class="pago-form-title">Registrar nuevo pago</div>
    <div class="pago-inputs">
      <div class="field"><label>Fecha</label><input type="date" id="ret-fecha" value="${hoy}"></div>
      <div class="field"><label>Monto $</label><input type="number" id="ret-monto" placeholder="0"></div>
      <div class="field" style="flex:2"><label>Descripción</label><input type="text" id="ret-desc" placeholder="Ej: Pago cueva semana 1"></div>
      <button class="btn btn-green" style="align-self:flex-end" onclick="addRetiro('${cid}')">+ Registrar</button>
    </div>
  </div>
  <div class="pagos-list">`;
  if(!retiros.length)html+=`<div class="empty" style="padding:20px;background:var(--white);border-radius:10px;border:1.5px solid var(--border)"><div class="empty-icon">💸</div>Sin pagos registrados aún</div>`;
  for(const r of retiros){
    html+=`<div class="pago-row">
      <div><div class="pr-date">${r.fecha||''}</div><div class="pr-desc">${r.descripcion||'Pago'}</div></div>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="pr-monto">- ${fmt(r.monto)}</div>
        <button class="btn btn-danger btn-sm" onclick="delRetiro('${r.id}')">✕</button>
      </div>
    </div>`;
  }
  html+=`</div>`;
  el.innerHTML=html;
}

async function addRetiro(cid){
  const fecha=document.getElementById('ret-fecha').value;
  const monto=parseFloat(document.getElementById('ret-monto').value);
  const desc=document.getElementById('ret-desc').value.trim()||'Pago cueva';
  if(!fecha||!monto||monto<=0)return showToast('Completá fecha y monto','err');
  try{await db.insertRetiro({client_id:cid,fecha,monto,descripcion:desc});showToast('✓ Pago registrado','ok');renderSection();}
  catch(e){showToast(e.message,'err');}
}
async function delRetiro(id){
  if(!confirm('¿Eliminar este pago?'))return;
  try{await db.deleteRetiro(id);showToast('Eliminado','ok');renderSection();}
  catch(e){showToast(e.message,'err');}
}

function openModal(){document.getElementById('modal-cliente').classList.add('open');}
function closeModal(){document.getElementById('modal-cliente').classList.remove('open');}
async function saveNewClient(){
  const nombre=document.getElementById('nc-nombre').value.trim();
  const username=document.getElementById('nc-user').value.trim();
  const password=document.getElementById('nc-pass').value.trim();
  const comision=parseFloat(document.getElementById('nc-comision').value)||9.5;
  if(!nombre||!username||!password)return showToast('Completá todos los campos','err');
  const client_id='c_'+Date.now();
  try{
    await db.insertUser({nombre,username,password,role:'client',comision:comision/100,client_id});
    showToast('✓ Cliente creado','ok');closeModal();renderSection();
  }catch(e){showToast(e.message,'err');}
}

function toBase64(file){return new Promise((r,j)=>{const fr=new FileReader();fr.onload=()=>r(fr.result.split(',')[1]);fr.onerror=()=>j(new Error('Error'));fr.readAsDataURL(file);});}
function todayStr(){return new Date().toISOString().split('T')[0];}
function addDays(fechaDDMMYYYY,days){
  if(!fechaDDMMYYYY)return'';
  let d;
  if(fechaDDMMYYYY.includes('/')){const[dd,mm,yyyy]=fechaDDMMYYYY.split('/');d=new Date(parseInt(yyyy),parseInt(mm)-1,parseInt(dd));}
  else d=new Date(fechaDDMMYYYY);
  d.setDate(d.getDate()+days);return d.toISOString().split('T')[0];
}
function fmt(n){return'$'+Math.round(n).toLocaleString('es-AR');}
function formatFecha(iso){
  if(!iso)return'—';
  const[y,m,d]=iso.split('-');
  const ms=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return`${parseInt(d)} ${ms[parseInt(m)-1]} ${y}`;
}
function calcAcreditado(cierres,hoy){
  let t=0;
  for(const c of cierres){
    const com=parseFloat(c.comision_pct||0);
    if(c.fecha_acred_qr&&c.fecha_acred_qr<=hoy)t+=parseFloat(c.qr_debito||0)-Math.round(parseFloat(c.qr_debito||0)*com);
    if(c.fecha_acred_credito&&c.fecha_acred_credito<=hoy)t+=parseFloat(c.credito||0)-Math.round(parseFloat(c.credito||0)*com);
  }
  return t;
}
function calcPendiente(cierres,hoy){
  let t=0;
  for(const c of cierres){
    const com=parseFloat(c.comision_pct||0);
    if(c.fecha_acred_qr&&c.fecha_acred_qr>hoy)t+=parseFloat(c.qr_debito||0)-Math.round(parseFloat(c.qr_debito||0)*com);
    if(c.fecha_acred_credito&&c.fecha_acred_credito>hoy)t+=parseFloat(c.credito||0)-Math.round(parseFloat(c.credito||0)*com);
  }
  return t;
}
function exportExcel(){
  const cid=viewingClientId||(session.role==='client'?session.client_id:null);
  const nombre=session.role==='client'?session.nombre:(session._vNombre||'cierres');
  db.getCierres(cid).then(cierres=>{
    const rows=[['Terminal','Fecha','Hora','N° Lote','N° Comercio','QR/Débito','Crédito','Total Bruto','Comisión %','Comisión $','Neto a Cobrar','Fecha Acred. QR/Déb','Fecha Acred. Crédito']];
    for(const c of cierres){
      rows.push([
        c.terminal||'',c.fecha||'',c.hora||'',c.nro_lote||'',c.nro_comercio||'',
        parseFloat(c.qr_debito||0),parseFloat(c.credito||0),parseFloat(c.total_pesos||0),
        ((parseFloat(c.comision_pct||0))*100).toFixed(1)+'%',
        parseFloat(c.comision_monto||0),parseFloat(c.saldo_neto||0),
        c.fecha_acred_qr||'',c.fecha_acred_credito||''
      ]);
    }
    rows.push([]);
    const totQr=cierres.reduce((s,c)=>s+parseFloat(c.qr_debito||0),0);
    const totCred=cierres.reduce((s,c)=>s+parseFloat(c.credito||0),0);
    const totBruto=cierres.reduce((s,c)=>s+parseFloat(c.total_pesos||0),0);
    const totCom=cierres.reduce((s,c)=>s+parseFloat(c.comision_monto||0),0);
    const totNeto=cierres.reduce((s,c)=>s+parseFloat(c.saldo_neto||0),0);
    rows.push(['TOTALES','','','','',totQr,totCred,totBruto,'',totCom,totNeto,'','']);
    const bom='\uFEFF';
    const csv=bom+rows.map(r=>r.map(v=>{
      const s=String(v===null||v===undefined?'':v);
      return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;
    }).join(',')).join('\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`cierres_${nombre}_${todayStr()}.csv`;
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);URL.revokeObjectURL(url);
    showToast('✓ Exportado — abrilo con Excel','ok');
  }).catch(e=>showToast(e.message,'err'));
}

function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+type;
  setTimeout(()=>t.classList.remove('show'),3500);
}
</script>
